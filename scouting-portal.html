        </div>
        <div style={{ textAlign: "right", flex: "none" }}>
          <div style={{ fontSize: 32, fontWeight: 700, color: C.text900, lineHeight: 1 }}>{REPORT.rating}<span style={{ fontSize: 16, color: C.text400, fontWeight: 600 }}> / 5</span></div>
          <div style={{ marginTop: 8, display: "flex", justifyContent: "flex-end" }}><Stars rating={REPORT.rating} /></div>
          <div style={{ fontSize: 12, color: C.text400, marginTop: 6 }}>Scout rating</div>
        </div>
        </div>
      </div>

      <div ref={rowRef} style={{ display: "flex", alignItems: "stretch", flex: "1 1 0", minHeight: 0, marginBottom: 0 }}>
        {collapsed[0] ? <CollapsedStrip i={0} /> : (
        <div className="cscroll" style={{ ...colStyle(0), overflowY: "auto", paddingRight: 20 }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
          <span style={{ fontSize: 18, fontWeight: 700, color: C.text900 }}>Video</span>
          <button onClick={() => toggleCol(0)} aria-label="Collapse video" title="Collapse" style={{ width: 30, height: 30, borderRadius: 8, border: `1px solid ${C.borderGrey}`, background: "#fff", color: C.text700, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", fontFamily: FONT, padding: 0, flex: "none" }}>
            <svg viewBox="0 0 16 16" width="15" height="15" fill="none"><path d="M3 8 H13" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" /></svg>
          </button>
        </div>
        <div style={{ padding: 0 }}>
          <div style={{ position: "relative", borderRadius: 12, overflow: "hidden", background: "#0F1E36", aspectRatio: "16 / 9" }}>
            <video
              ref={videoRef}
              src={LOCAL_VIDEO}
              controls
              preload="metadata"
              style={{ position: "absolute", inset: 0, width: "100%", height: "100%", background: "#0F1E36" }}
            >
              Your browser can't play this video.
            </video>
            {loading && (
              <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", zIndex: 2, color: "rgba(255,255,255,.7)", fontSize: 14, background: "radial-gradient(circle at 50% 38%, #234 0%, #0F1E36 70%)" }}>Loading clip…</div>
            )}
            <span style={{ position: "absolute", top: 12, left: 12, zIndex: 3, display: "inline-flex", alignItems: "center", gap: 6, fontSize: 11, fontWeight: 700, color: "#fff", background: EVENT[activeVideo.type].color, padding: "4px 10px", borderRadius: 9999, pointerEvents: "none" }}>
              {EVENT[activeVideo.type].label} · {activeVideo.title}
            </span>
          </div>

          {(() => {
            const isBalls = momentsView === "ballbyball";
            const fullList = isBalls
              ? BALLS.filter((b) => (b.innings || 1) === 1 && b.over <= 6)
                     .slice().sort((a, b) => (a.over - b.over) || (a.ball - b.ball))
              : MOMENTS;
            const shownList = isBalls ? visibleBalls : visibleMoments;
            const activeId = isBalls ? activeBall : activeClip;
            const onMarker = isBalls ? playBall : playClip;
            const markerLabel = (item) => isBalls ? `Over ${ballRef(item)} · ${item.outcome}` : item.title;
            const edgeLabel = (ratio) => {
              const r = Math.max(0, Math.min(1, ratio));
              if (isBalls) {
                if (!fullList.length) return "–";
                const idx = Math.round(r * (fullList.length - 1));
                const b = fullList[idx];
                return b ? `Over ${ballRef(b)}` : "–";
              }
              return fmtClock(Math.round(r * MATCH_LEN));
            };
            return (
          <div style={{ marginTop: 4 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", fontSize: 12, color: C.text500, marginBottom: 8 }}>
              <span style={{ fontWeight: 600, color: C.text700 }}>Player timeline</span>
              <span>{shownList.length} of {fullList.length} {isBalls ? "balls" : "events"} shown</span>
            </div>
            <div
              ref={tlScrollRef}
              className="hscroll"
              onScroll={updateTlWin}
              onWheel={(e) => {
                if (e.ctrlKey || e.metaKey || e.shiftKey) {
                  e.preventDefault();
                  const el = tlScrollRef.current;
                  const ratio = el ? (e.clientX - el.getBoundingClientRect().left) / el.clientWidth : 0.5;
                  zoomTimeline(e.deltaY < 0 ? 1 : -1, ratio);
                }
              }}
              style={{ overflowX: tlZoom > 1 ? "scroll" : "hidden", overflowY: "hidden", paddingTop: 30 }}
            >
            <div style={{ position: "relative", height: 44, width: `${tlZoom * 100}%` }}>
              <div style={{ position: "absolute", left: 0, right: 0, top: 20, height: 4, borderRadius: 9999, background: "#EDEFF2" }} />
              <div style={{ position: "absolute", left: 0, top: 20, height: 4, borderRadius: 9999, background: C.navy, width: `${isBalls ? ((Math.max(0, fullList.findIndex((x) => x.id === activeId)) / Math.max(1, fullList.length - 1)) * 100) : ((activeVideo.at / MATCH_LEN) * 100)}%`, transition: "width .35s ease" }} />
              {fullList.map((m, mi) => {
                const shown = shownList.some((v) => v.id === m.id);
                const isActive = m.id === activeId;
                const left = `${isBalls ? ((mi / Math.max(1, fullList.length - 1)) * 100) : ((m.at / MATCH_LEN) * 100)}%`;
                return (
                  <div
                    key={m.id}
                    onMouseEnter={() => setHoverMarker(m.id)}
                    onMouseLeave={() => setHoverMarker(null)}
                    onClick={() => onMarker(m.id)}
                    style={{ position: "absolute", left, top: 22, transform: "translate(-50%,-50%)", cursor: "pointer", zIndex: isActive ? 5 : 3 }}
                  >
                    <span style={{
                      display: "block", width: isActive ? 18 : 12, height: isActive ? 18 : 12, borderRadius: "50%",
                      background: EVENT[m.type].color, opacity: shown ? 1 : 0.22,
                      border: isActive ? "3px solid #fff" : "2px solid #fff",
                      boxShadow: isActive ? `0 0 0 2px ${EVENT[m.type].color}` : "0 1px 3px rgba(0,0,0,.25)",
                      transition: "all .2s ease",
                    }} />
                    {hoverMarker === m.id && (
                      <div style={{ position: "absolute", bottom: 22, left: "50%", transform: "translateX(-50%)", whiteSpace: "nowrap", background: C.navyDark, color: "#fff", fontSize: 11, padding: "6px 9px", borderRadius: 7, zIndex: 10 }}>
                        <strong>{fmtClock(m.at)}</strong> · {markerLabel(m)}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
            </div>
            {tlZoom > 1 && (
              <div
                ref={tlBarRef}
                onMouseDown={(e) => {
                  const bar = tlBarRef.current;
                  if (!bar) return;
                  const rect = bar.getBoundingClientRect();
                  const winW = 1 / tlZoomRef.current;
                  const center = (e.clientX - rect.left) / rect.width;
                  scrollToRatio(Math.max(0, Math.min(1 - winW, center - winW / 2)));
                  setTlBarDrag(true);
                }}
                style={{ position: "relative", height: 12, marginTop: 8, borderRadius: 1000, background: "rgba(0,11,28,0.06)", cursor: "pointer", touchAction: "none" }}
              >
                <div
                  onMouseDown={(e) => { e.stopPropagation(); setTlBarDrag(true); }}
                  onTouchStart={(e) => { e.stopPropagation(); setTlBarDrag(true); }}
                  style={{
                    position: "absolute", top: 0, bottom: 0,
                    left: `${tlWin.left * 100}%`,
                    width: `${Math.max(6, (tlWin.right - tlWin.left) * 100)}%`,
                    background: "#000B1C", borderRadius: 1000,
                    cursor: tlBarDrag ? "grabbing" : "grab",
                    transition: tlBarDrag ? "none" : "left .1s ease, width .25s ease",
                  }}
                />
              </div>
            )}
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginTop: 6, gap: 12 }}>
              <span style={{ fontSize: 11, fontWeight: 600, color: C.text500, fontVariantNumeric: "tabular-nums" }}>{edgeLabel(tlWin.left)}</span>
              <span style={{ fontSize: 11, fontWeight: 600, color: C.text500, fontVariantNumeric: "tabular-nums" }}>{edgeLabel(tlWin.right)}</span>
            </div>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginTop: 10, gap: 16 }}>
              <div style={{ display: "flex", gap: 16, flexWrap: "wrap" }}>
                {Object.entries(EVENT).map(([k, v]) => (
                  <span key={k} style={{ display: "inline-flex", alignItems: "center", gap: 6, fontSize: 12, color: C.text500 }}>
                    <span style={{ width: 9, height: 9, borderRadius: "50%", background: v.color }} />{v.label}
                  </span>
                ))}
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 6, flex: "none" }}>
                <button
                  onClick={() => zoomTimeline(-1)}
                  disabled={tlZoom <= TL_MIN}
                  title="Zoom out"
                  aria-label="Zoom out timeline"
                  style={{ width: 34, height: 34, borderRadius: 8, border: `1px solid ${C.borderGrey}`, background: "#fff", color: tlZoom <= TL_MIN ? C.text400 : C.text700, cursor: tlZoom <= TL_MIN ? "default" : "pointer", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: FONT, padding: 0 }}
                >
                  <svg viewBox="0 0 18 18" width="18" height="18" fill="none"><path d="M4 9 H14" stroke="currentColor" strokeWidth="2" strokeLinecap="round" /></svg>
                </button>
                <span style={{ minWidth: 34, textAlign: "center", fontSize: 13, fontWeight: 600, color: C.text700 }}>{tlZoom}×</span>
                <button
                  onClick={() => zoomTimeline(1)}
                  disabled={tlZoom >= TL_MAX}
                  title="Zoom in"
                  aria-label="Zoom in timeline"
                  style={{ width: 34, height: 34, borderRadius: 8, border: `1px solid ${C.borderGrey}`, background: "#fff", color: tlZoom >= TL_MAX ? C.text400 : C.text700, cursor: tlZoom >= TL_MAX ? "default" : "pointer", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: FONT, padding: 0 }}
                >
                  <svg viewBox="0 0 18 18" width="18" height="18" fill="none"><path d="M9 4 V14 M4 9 H14" stroke="currentColor" strokeWidth="2" strokeLinecap="round" /></svg>
                </button>
              </div>
            </div>
          </div>
            );
          })()}
        </div>
        </div>
        )}

        {!anyCollapsed && (
        <div
          onMouseDown={() => setDragIdx(0)}
          onTouchStart={() => setDragIdx(0)}
          title="Drag to resize"
          style={{ flex: "none", width: 25, cursor: "col-resize", display: "flex", alignItems: "stretch", justifyContent: "center", touchAction: "none" }}
        >
          <div style={{ width: 1, background: dragIdx === 0 ? C.activeBlue : C.border, alignSelf: "stretch", transition: "background .15s" }} />
        </div>
        )}

        {collapsed[1] ? <CollapsedStrip i={1} /> : (
        <div className="cscroll" style={{ ...colStyle(1), overflowY: "auto", padding: "0 20px", display: "flex", flexDirection: "column" }}>
          <div style={{ display: "flex", alignItems: "center", marginBottom: 18, gap: 12 }}>
            <h2 style={{ fontSize: 18, fontWeight: 700, color: C.text900 }}>Player moments</h2>
            <span style={{ marginLeft: "auto", fontSize: 12, color: C.text400 }}>{momentsView === "ballbyball" ? `${visibleBalls.length} balls` : `${visibleMoments.length} clips`}</span>
            <button onClick={() => toggleCol(1)} aria-label="Collapse player moments" title="Collapse" style={{ width: 30, height: 30, borderRadius: 8, border: `1px solid ${C.borderGrey}`, background: "#fff", color: C.text700, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", fontFamily: FONT, padding: 0, flex: "none" }}>
              <svg viewBox="0 0 16 16" width="15" height="15" fill="none"><path d="M3 8 H13" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" /></svg>
            </button>
          </div>

          {restrictClips && (
            <div style={{ display: "flex", alignItems: "center", gap: 10, background: "rgba(26,168,224,0.10)", border: `1px solid rgba(26,168,224,0.35)`, borderRadius: 10, padding: "9px 12px", marginBottom: 14 }}>
              <svg viewBox="0 0 20 20" width="15" height="15" fill="none" style={{ flex: "none" }}><path d="M4 4 H16 L11 10 V16 L9 14 V10 Z" stroke={C.activeBlue} strokeWidth="1.5" strokeLinejoin="round" /></svg>
              <span style={{ fontSize: 12.5, color: C.text700, flex: 1, lineHeight: "16px" }}>
                Showing <strong style={{ color: C.text900 }}>{restrictClips.length}</strong> clip{restrictClips.length === 1 ? "" : "s"} linked from the {restrictSource === "search" ? "search" : "report"}
              </span>
              <button
                onClick={() => runFilter("all")}
                style={{ display: "inline-flex", alignItems: "center", gap: 5, flex: "none", fontSize: 12.5, fontWeight: 700, color: C.activeBlue, background: "#fff", border: `1px solid rgba(26,168,224,0.4)`, borderRadius: 8, padding: "5px 10px", cursor: "pointer", fontFamily: FONT }}
              >
                <svg viewBox="0 0 16 16" width="12" height="12" fill="none"><path d="M3 3 L13 13 M13 3 L3 13" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" /></svg>
                Clear
              </button>
            </div>
          )}

          <div style={{ background: C.navy, borderRadius: 12, padding: "14px 14px", marginBottom: 14 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
              <svg viewBox="0 0 20 20" width="16" height="16" fill="none"><path d="M10 2 L12 8 L18 10 L12 12 L10 18 L8 12 L2 10 L8 8 Z" stroke="#1AA8E0" strokeWidth="1.5" strokeLinejoin="round" /></svg>
              <span style={{ fontSize: 13.5, fontWeight: 700, color: "#fff" }}>Find player moments</span>
            </div>
            <div style={{ display: "flex", gap: 8 }}>
              <input
                value={query}
                onChange={(e) => setQuery(e.target.value)}
                onKeyDown={(e) => { if (e.key === "Enter") submitQuery(query); }}
                placeholder="e.g. “yorkers in final overs”"
                style={{ flex: 1, minWidth: 0, padding: "9px 12px", borderRadius: 8, border: "none", fontSize: 13, fontFamily: FONT, color: C.text900, outline: "none" }}
              />
              <button onClick={() => submitQuery(query)} style={{ padding: "9px 14px", borderRadius: 8, border: "none", background: C.activeBlue, color: "#fff", fontSize: 13, fontWeight: 700, cursor: "pointer", fontFamily: FONT, flex: "none" }}>Find</button>
            </div>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginTop: 10 }}>
              {["Yorkers in final overs", "Mistakes early on", "Pressure moments"].map((q) => (
                <button key={q} onClick={() => { setQuery(q); submitQuery(q); }} style={{ fontSize: 11.5, color: "rgba(255,255,255,.85)", background: "rgba(255,255,255,.1)", border: "none", borderRadius: 9999, padding: "5px 11px", cursor: "pointer", fontFamily: FONT }}>{q}</button>
              ))}
            </div>
          </div>

          <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 14 }}>
            <FilterPill active={filter === "all" && !restrictClips} label="All" onClick={() => runFilter("all")} />
            <FilterPill active={filter === "wicket"} color={EVENT.wicket.color} label="Wickets" count={counts.wicket} onClick={() => runFilter("wicket")} />
            <FilterPill active={filter === "yorker"} color={EVENT.yorker.color} label="Yorkers" count={counts.yorker} onClick={() => runFilter("yorker")} />
            <FilterPill active={filter === "error"} color={EVENT.error.color} label="Errors" count={counts.error} onClick={() => runFilter("error")} />
          </div>

          <div style={{ display: "flex", background: C.bgGrey, borderRadius: 10, padding: 3, marginBottom: 14 }}>
            {[["activity", "Activity"], ["ballbyball", "Ball-by-ball"]].map(([k, label]) => (
              <button
                key={k}
                onClick={() => setMomentsView(k)}
                style={{
                  flex: 1, padding: "8px 12px", borderRadius: 8, border: "none", cursor: "pointer", fontFamily: FONT,
                  fontSize: 13, fontWeight: 600,
                  background: momentsView === k ? "#fff" : "transparent",
                  color: momentsView === k ? C.text900 : C.text500,
                  boxShadow: momentsView === k ? "0 1px 2px rgba(0,0,0,.08)" : "none",
                  transition: "color .15s",
                }}
              >{label}</button>
            ))}
          </div>

          <div style={{ flex: 1 }}>
            {loading ? (
              [0, 1, 2].map((i) => (
                <div key={i} style={{ display: "flex", gap: 12, padding: "10px 0" }}>
                  <div style={{ width: 84, height: 52, borderRadius: 8, background: "#EDEFF2" }} className="skl" />
                  <div style={{ flex: 1 }}>
                    <div style={{ height: 12, width: "60%", background: "#EDEFF2", borderRadius: 4, marginBottom: 8 }} className="skl" />
                    <div style={{ height: 10, width: "90%", background: "#EDEFF2", borderRadius: 4 }} className="skl" />
                  </div>
                </div>
              ))
            ) : momentsView === "ballbyball" ? (
              visibleBalls.length === 0 ? (
                <div style={{ padding: "32px 8px", textAlign: "center", color: C.text500, fontSize: 14 }}>No deliveries match this filter. Choose another event type to see balls.</div>
              ) : (
                visibleBalls.map((b) => {
                  const isActive = b.id === activeBall;
                  return (
                    <div
                      key={b.id}
                      onClick={() => playBall(b.id)}
                      className="clip-row"
                      style={{
                        display: "flex", gap: 12, padding: "10px 8px", borderRadius: 10, cursor: "pointer", marginBottom: 4,
                        background: isActive ? "rgba(26,168,224,0.08)" : "transparent",
                        border: isActive ? `1px solid rgba(26,168,224,0.4)` : "1px solid transparent",
                        transition: "background .15s",
                      }}
                    >
                      <div style={{ position: "relative", width: 84, height: 52, borderRadius: 8, overflow: "hidden", flex: "none", background: "#0F1E36" }}>
                        <div style={{ position: "absolute", inset: 0, background: "radial-gradient(circle at 50% 40%, #2a3b56, #0F1E36)" }} />
                        <span style={{ position: "absolute", top: 4, left: 4, fontSize: 9, fontWeight: 700, color: "#fff", background: "rgba(0,0,0,.45)", padding: "1px 5px", borderRadius: 4 }}>{ballRef(b)}</span>
                        <span style={{ position: "absolute", top: 4, right: 4, width: 7, height: 7, borderRadius: "50%", background: EVENT[b.type].color }} />
                        <span style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center" }}>
                          <svg viewBox="0 0 24 24" width="18" height="18" fill="rgba(255,255,255,.85)"><path d="M8 5 L19 12 L8 19 Z" /></svg>
                        </span>
                      </div>
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                          <span style={{ fontSize: 14, fontWeight: 700, color: C.text900 }}>Over {ballRef(b)}</span>
                          <span style={{ fontSize: 10.5, fontWeight: 700, letterSpacing: ".3px", padding: "2px 8px", borderRadius: 9999, color: "#fff", background: EVENT[b.type].color }}>{b.outcome}</span>
                        </div>
                        <div style={{ display: "flex", flexWrap: "wrap", gap: 6, margin: "5px 0 5px" }}>
                          {[b.line, b.length, `${b.speed} km/h`, b.shot].map((meta, i) => (
                            <span key={i} style={{ fontSize: 10.5, fontWeight: 600, color: C.text700, background: C.bgGrey, padding: "2px 8px", borderRadius: 6 }}>{meta}</span>
                          ))}
                        </div>
                        <div style={{ fontSize: 12, color: C.text500, lineHeight: "16px" }}>{b.note}</div>
                      </div>
                    </div>
                  );
                })
              )
            ) : visibleMoments.length === 0 ? (
              <div style={{ padding: "32px 8px", textAlign: "center", color: C.text500, fontSize: 14 }}>No clips match this filter. Choose another event type to see moments.</div>
            ) : (
              visibleMoments.map((m) => {
                const isActive = m.id === activeClip;
                return (
                  <div
                    key={m.id}
                    onClick={() => playClip(m.id)}
                    className="clip-row"
                    style={{
                      display: "flex", gap: 12, padding: "10px 8px", borderRadius: 10, cursor: "pointer", marginBottom: 4,
                      background: isActive ? "rgba(26,168,224,0.08)" : "transparent",
                      border: isActive ? `1px solid rgba(26,168,224,0.4)` : "1px solid transparent",
                      transition: "background .15s",
                    }}
                  >
                    <div style={{ position: "relative", width: 84, height: 52, borderRadius: 8, overflow: "hidden", flex: "none", background: "#0F1E36" }}>
                      <div style={{ position: "absolute", inset: 0, background: "radial-gradient(circle at 50% 40%, #2a3b56, #0F1E36)" }} />
                      <span style={{ position: "absolute", top: 4, left: 4, width: 7, height: 7, borderRadius: "50%", background: EVENT[m.type].color }} />
                      <span style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center" }}>
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="rgba(255,255,255,.85)"><path d="M8 5 L19 12 L8 19 Z" /></svg>
                      </span>
                    </div>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                        <span style={{ fontSize: 14, fontWeight: 700, color: C.text900 }}>{m.title}</span>
                      </div>
                      <div style={{ fontSize: 11, color: C.text400, margin: "2px 0 3px" }}>Over {m.range} · {fmtClock(m.start)}–{fmtClock(m.end)}</div>
                      <div style={{ fontSize: 12, color: C.text500, lineHeight: "16px" }}>{m.note}</div>
                    </div>
                  </div>
                );
              })
            )}
          </div>
        </div>
        )}

        {!anyCollapsed && (
        <div
          onMouseDown={() => setDragIdx(1)}
          onTouchStart={() => setDragIdx(1)}
          title="Drag to resize"
          style={{ flex: "none", width: 25, cursor: "col-resize", display: "flex", alignItems: "stretch", justifyContent: "center", touchAction: "none" }}
        >
          <div style={{ width: 1, background: dragIdx === 1 ? C.activeBlue : C.border, alignSelf: "stretch", transition: "background .15s" }} />
        </div>
        )}

        {collapsed[2] ? <CollapsedStrip i={2} /> : (
        <div style={{ ...colStyle(2), display: "flex", flexDirection: "column", overflow: "hidden", paddingLeft: 20 }}>
          <div style={{ display: "flex", alignItems: "center", marginBottom: 18, gap: 12, flex: "none" }}>
            <h2 style={{ fontSize: 18, fontWeight: 700, color: C.text900 }}>Scout report</h2>
            <button onClick={() => toggleCol(2)} aria-label="Collapse scout report" title="Collapse" style={{ marginLeft: "auto", width: 30, height: 30, borderRadius: 8, border: `1px solid ${C.borderGrey}`, background: "#fff", color: C.text700, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", fontFamily: FONT, padding: 0, flex: "none" }}>
              <svg viewBox="0 0 16 16" width="15" height="15" fill="none"><path d="M3 8 H13" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" /></svg>
            </button>
          </div>

          <div className="cscroll" style={{ flex: "1 1 0", minHeight: 0, overflowY: "auto" }}>
            <ScoutReport activeTab={reportSection} setActiveTab={setReportSection} onViewClips={viewSupporting} showNav={false} />
          </div>
          <ScoutReportNav activeTab={reportSection} setActiveTab={setReportSection} />
        </div>
        )}
      </div>

        </div>
    </main>
    </div>
  );
}


/* ---------------- Player Detail ----------------
   A single-player landing page: profile header, a video gallery
   (every clip we hold for the player, each seekable in the inline
   player), and the list of scout reports completed on the player.

   Rich clip / report fixtures only exist for Muhammad Davis in this
   prototype, so we attach the Davis dataset to the matching report
   player and fall back to graceful empty states otherwise. */

/* Match a roster player to any reports filed on them. The roster uses
   first+last names that don't all appear in REPORT_LIST, so we match on
   name and, for the demo, treat the Davis fixtures as the worked example. */
function reportsForPlayer(p) {
  if (!p) return [];
  if (p.id === "marcus") return MARCUS_REPORTS;
  if (p.id === "davis") return DAVIS_REPORTS;
  const byName = REPORT_LIST.filter((r) => r.player.toLowerCase() === p.name.toLowerCase());
  if (byName.length) return byName;
  return [];
}

/* Clips we hold for a player. Marcus and Davis have full generated sets. */
function clipsForPlayer(p) {
  if (!p) return [];
  if (p.id === "marcus") return MARCUS_CLIPS;
  if (p.id === "davis") return DAVIS_CLIPS;
  return [];
}

function PlayerDetail({ playerId, onBack, onNavigate, onOpenReport }) {
  const player = PLAYERS.find((p) => p.id === playerId) || PLAYERS[0];
  const clips = clipsForPlayer(player);
  const reports = reportsForPlayer(player);
  const firstName = player.name.split(" ")[0];
  const poss = firstName + (firstName.endsWith("s") ? "'" : "'s"); // possessive, e.g. "Marcus's"

  const [activeClip, setActiveClip] = useState(clips[0] ? clips[0].id : null);
  const [tab, setTab] = useState("video"); // "video" | "reports"
  const [mode, setMode] = useState("standard"); // "standard" | "ai"
  const [text, setText] = useState("");          // standard search box
  const [aiQuery, setAiQuery] = useState("");     // AI input value
  const [aiState, setAiState] = useState("idle"); // "idle" | "thinking" | "done"
  const [aiResult, setAiResult] = useState(null);
  const aiTimer = useRef(null);
  useEffect(() => () => clearTimeout(aiTimer.current), []);

  // Reset any active search when switching tabs so results stay scoped.
  useEffect(() => { setText(""); setAiState("idle"); setAiResult(null); setAiQuery(""); }, [tab]);
  const videoRef = useRef(null);
  const LOCAL_VIDEO = encodeURI("Screen Recording 2026-06-18 120510.mp4");
  const activeMoment = clips.find((m) => m.id === activeClip) || clips[0] || null;

  // Seek the inline player to the selected clip's start.
  useEffect(() => {
    const v = videoRef.current;
    if (!v || !activeMoment) return;
    const seek = () => { try { v.currentTime = activeMoment.videoStart || 0; } catch (e) {} };
    if (v.readyState >= 1) seek();
    else v.addEventListener("loadedmetadata", seek, { once: true });
  }, [activeClip]);

  const playClip = (id) => {
    setActiveClip(id);
    const v = videoRef.current;
    const m = clips.find((c) => c.id === id);
    if (v && m) {
      const go = () => { try { v.currentTime = m.videoStart || 0; v.play && v.play().catch(() => {}); } catch (e) {} };
      if (v.readyState >= 1) go();
      else v.addEventListener("loadedmetadata", go, { once: true });
    }
  };

  const fmtColor = { Test: "#1A2B47", ODI: "#1F5BD7", T20: "#1AA8E0" };

  const Pill = ({ children, bg, color }) => (
    <span style={{ fontSize: 13, fontWeight: 600, color: color || C.text700, background: bg || C.bgGrey, padding: "5px 12px", borderRadius: 9999, whiteSpace: "nowrap" }}>{children}</span>
  );

  // ---- Search: scope is the active tab's content (clips or reports) ----
  const searchPlaceholder = tab === "video"
    ? `Search ${poss} clips by description, shot or moment...`
    : `Search ${poss} reports by fixture, scout or format...`;

  const aiPlaceholder = tab === "video"
    ? `Describe the footage you want — e.g. show me ${poss} biggest hits`
    : `Describe the reports you want — e.g. ${poss} strongest Test-format assessments`;

  const aiExamples = tab === "video"
    ? [
        { icon: "trophy", text: `${poss} biggest hits`, hint: "Boundaries and sixes" },
        { icon: "spark", text: `Where did ${firstName} score freely?`, hint: "Clean, controlled scoring shots" },
        { icon: "shield", text: `${firstName} under pressure`, hint: "Solid defence and leaves" },
        { icon: "rise", text: `Show me ${poss} risky moments`, hint: "Plays-and-misses and chances" },
      ]
    : [
        { icon: "trophy", text: `${poss} highest-rated assessments`, hint: "Top scout ratings first" },
        { icon: "shield", text: `${poss} Test-format reports only`, hint: "Red-ball readiness" },
        { icon: "rise", text: `Most recent reports on ${firstName}`, hint: "Newest first" },
        { icon: "spark", text: "Reports by Sandra Mehta", hint: "Filter to a specific scout" },
      ];

  // Standard text filter, scoped to the active tab.
  const shownClips = useMemo(() => {
    const q = text.trim().toLowerCase();
    if (!q) return clips;
    return clips.filter((m) => [m.title, m.note, EVENT[m.type].label, m.range].join(" ").toLowerCase().includes(q));
  }, [text, clips]);

  const shownReports = useMemo(() => {
    const q = text.trim().toLowerCase();
    if (!q) return reports;
    return reports.filter((r) => [r.fixture, r.scout, r.format, r.role, r.date].join(" ").toLowerCase().includes(q));
  }, [text, reports]);

  // Lightweight intent matcher standing in for an LLM call (mirrors aiSearch).
  function aiClipSearch(query) {
    const q = (query || "").toLowerCase();
    const has = (...w) => w.some((x) => q.includes(x));
    let intents = [], summary = "", filterFn = () => true, scorer = () => 0;
    if (has("six", "hit", "boundary", "four", "best", "biggest", "attacking", "power")) {
      intents = ["Boundaries & big hits"]; summary = `Surfacing ${poss} biggest hits — the boundaries and sixes where ${firstName} took the attack on.`;
      filterFn = (m) => m.type === "wicket"; scorer = (m) => m.start;
    } else if (has("score", "scoring", "rotate", "freely", "fluent", "strike")) {
      intents = ["Clean scoring shots"]; summary = `Pulling the passages where ${firstName} scored freely — clean, controlled shots and strike rotation.`;
      filterFn = (m) => m.type === "yorker"; scorer = (m) => m.start;
    } else if (has("defen", "leave", "pressure", "solid", "watchful", "block")) {
      intents = ["Defence under pressure"]; summary = `Showing how ${firstName} handled pressure — tight defence, good leaves and watchful play.`;
      filterFn = (m) => m.type === "dot"; scorer = (m) => m.start;
    } else if (has("risk", "risky", "miss", "edge", "chance", "loose", "weak", "dismiss")) {
      intents = ["Risk & chances"]; summary = `Highlighting ${poss} risky moments — plays-and-misses, edges and chances offered.`;
      filterFn = (m) => m.type === "error"; scorer = (m) => m.start;
    } else {
      intents = ["All key moments"]; summary = `Couldn't tie this to a specific shot type, so here's the full set of ${firstName}'s key moments. Try "biggest hits", "scoring shots", "under pressure" or "risky moments".`;
      filterFn = () => true; scorer = (m) => m.start;
    }
    const ranked = clips.filter(filterFn).sort((a, b) => scorer(a) - scorer(b));
    return { kind: "clips", intents, summary, items: ranked.length ? ranked : clips };
  }

  function aiReportSearch(query) {
    const q = (query || "").toLowerCase();
    const has = (...w) => w.some((x) => q.includes(x));
    let intents = [], summary = "", list = [...reports];
    if (has("highest", "best", "top", "rated", "rating", "strongest")) {
      intents = ["Highest-rated first"]; summary = `Ranking ${poss} reports by scout rating, strongest assessment first.`;
      list.sort((a, b) => b.rating - a.rating);
    } else if (has("test", "red-ball", "red ball")) {
      intents = ["Test format"]; summary = `Filtering to ${poss} red-ball, Test-format assessments.`;
      list = list.filter((r) => r.format === "Test");
    } else if (has("odi", "one-day", "50")) {
      intents = ["ODI format"]; summary = `Filtering to ${poss} one-day, ODI-format assessments.`;
      list = list.filter((r) => r.format === "ODI");
    } else if (has("t20", "twenty", "white-ball", "white ball")) {
      intents = ["T20 format"]; summary = `Filtering to ${poss} white-ball, T20-format assessments.`;
      list = list.filter((r) => r.format === "T20");
    } else if (has("recent", "latest", "newest", "new")) {
      intents = ["Most recent first"]; summary = `Ordering ${poss} reports by date, the most recent first.`;
      list.sort((a, b) => new Date(b.sortDate) - new Date(a.sortDate));
    } else {
      const scout = reports.map((r) => r.scout).find((s) => q.includes(s.toLowerCase().split(" ")[0]) || q.includes(s.toLowerCase()));
      if (scout) { intents = [`Scout: ${scout}`]; summary = `Filtering to ${poss} reports filed by ${scout}.`; list = list.filter((r) => r.scout === scout); }
      else { intents = ["All reports"]; summary = `Couldn't tie this to a format, scout or sort, so here's every report on ${firstName}. Try a format (Test, ODI, T20), a scout name, or "highest rated".`; }
    }
    return { kind: "reports", intents, summary, items: list.length ? list : reports };
  }

  const runAi = (q) => {
    const query = (q != null ? q : aiQuery).trim();
    if (!query) return;
    setAiQuery(query);
    setAiState("thinking");
    setAiResult(null);
    clearTimeout(aiTimer.current);
    aiTimer.current = setTimeout(() => {
      setAiResult(tab === "video" ? aiClipSearch(query) : aiReportSearch(query));
      setAiState("done");
    }, 1400);
  };
  const resetAi = () => { setAiState("idle"); setAiResult(null); setAiQuery(""); };

  // What the active tab should actually render.
  const displayClips = mode === "ai" && aiState === "done" && aiResult && aiResult.kind === "clips" ? aiResult.items : shownClips;
  const displayReports = mode === "ai" && aiState === "done" && aiResult && aiResult.kind === "reports" ? aiResult.items : shownReports;

  // If the active clip falls out of the visible set, snap to the first shown.
  useEffect(() => {
    if (tab !== "video") return;
    if (displayClips.length && !displayClips.some((m) => m.id === activeClip)) {
      setActiveClip(displayClips[0].id);
    }
  }, [displayClips, tab]);

  // Search UI (Standard / AI) — rendered inside the active tab.
  const searchBlock = (
      <div style={{ marginBottom: 22 }}>
        {/* Mode toggle */}
        <div style={{ display: "flex", alignItems: "center", gap: 6, background: C.bgGrey, border: `1px solid ${C.border}`, borderRadius: 9999, padding: 4, marginBottom: 14, width: "fit-content" }}>
          {[
            { key: "standard", label: "Standard", icon: <svg viewBox="0 0 18 18" fill="none" width="15" height="15"><circle cx="8" cy="8" r="5" stroke="currentColor" strokeWidth="1.6" /><path d="M12 12 L16 16" stroke="currentColor" strokeWidth="1.6" /></svg> },
            { key: "ai", label: "AI Mode", icon: <Sparkle size={15} /> },
          ].map((t) => {
            const on = mode === t.key;
            return (
              <button key={t.key} onClick={() => setMode(t.key)} style={{
                display: "flex", alignItems: "center", gap: 7, border: "none", cursor: "pointer", fontFamily: FONT,
                fontSize: 14, fontWeight: 600, padding: "8px 16px", borderRadius: 9999,
                color: on ? "#fff" : C.text500,
                background: on ? (t.key === "ai" ? "linear-gradient(100deg, #1AA8E0, #6E59F2)" : C.navy) : "transparent",
              }}>{t.icon}{t.label}</button>
            );
          })}
        </div>

        {mode === "standard" ? (
          <div style={{ display: "flex", alignItems: "center", gap: 10, background: C.bgGrey, border: `1px solid ${C.border}`, borderRadius: 12, padding: "14px 18px" }}>
            <svg viewBox="0 0 18 18" fill="none" width="18" height="18"><circle cx="8" cy="8" r="5" stroke={C.text400} strokeWidth="1.6" /><path d="M12 12 L16 16" stroke={C.text400} strokeWidth="1.6" /></svg>
            <input value={text} onChange={(e) => setText(e.target.value)} placeholder={searchPlaceholder} style={{ flex: 1, border: "none", outline: "none", background: "transparent", fontSize: 15, color: C.text900, fontFamily: FONT }} />
            {text && <span onClick={() => setText("")} style={{ cursor: "pointer", color: C.text400, display: "inline-flex" }}><svg viewBox="0 0 16 16" fill="none" width="15" height="15"><path d="M3 3 L13 13 M13 3 L3 13" stroke="currentColor" strokeWidth="1.6" /></svg></span>}
          </div>
        ) : (
          <>
            {/* AI prompt box */}
            <div style={{ position: "relative", borderRadius: 16, padding: 1.5, background: "linear-gradient(100deg, #1AA8E0, #6E59F2)" }}>
              <div style={{ background: "#fff", borderRadius: 14.5, padding: 14 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                  <span style={{ flex: "none", color: "#6E59F2", display: "flex" }}><Sparkle size={20} /></span>
                  <textarea
                    value={aiQuery}
                    onChange={(e) => setAiQuery(e.target.value)}
                    onKeyDown={(e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); runAi(); } }}
                    rows={1}
                    placeholder={aiPlaceholder}
                    style={{ flex: 1, border: "none", outline: "none", resize: "none", fontSize: 15.5, lineHeight: "22px", height: 22, color: C.text900, fontFamily: FONT, padding: 0, margin: 0, display: "block", background: "transparent" }}
                  />
                  <button
                    onClick={() => runAi()}
                    disabled={!aiQuery.trim() || aiState === "thinking"}
                    style={{ flex: "none", display: "flex", alignItems: "center", gap: 8, border: "none", borderRadius: 10, padding: "10px 18px", fontFamily: FONT, fontSize: 14, fontWeight: 600, color: "#fff", cursor: aiQuery.trim() ? "pointer" : "not-allowed", background: aiQuery.trim() ? "linear-gradient(100deg, #1AA8E0, #6E59F2)" : "#C7CBD3" }}
                  >
                    {aiState === "thinking" ? "Searching" : "Search"}
                    <svg viewBox="0 0 16 16" fill="none" width="15" height="15"><path d="M3 8 H12 M8 4 L12 8 L8 12" stroke="#fff" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" /></svg>
                  </button>
                </div>
              </div>
            </div>

            {/* Inspiration examples while idle */}
            {aiState === "idle" && (
              <div style={{ display: "grid", gridTemplateColumns: "repeat(2, 1fr)", gap: 12, marginTop: 14 }}>
                {aiExamples.map((ex) => (
                  <button key={ex.text} onClick={() => runAi(ex.text)} style={{ textAlign: "left", display: "flex", gap: 12, alignItems: "flex-start", background: "#fff", border: `1px solid ${C.border}`, borderRadius: 12, padding: "12px 14px", cursor: "pointer", fontFamily: FONT, transition: "border-color .15s, box-shadow .15s" }}
                    onMouseEnter={(e) => { e.currentTarget.style.borderColor = "#BBA9F2"; e.currentTarget.style.boxShadow = "0 2px 10px rgba(110,89,242,0.12)"; }}
                    onMouseLeave={(e) => { e.currentTarget.style.borderColor = C.border; e.currentTarget.style.boxShadow = "none"; }}>
                    <span style={{ flex: "none", width: 32, height: 32, borderRadius: 9, display: "flex", alignItems: "center", justifyContent: "center", color: "#6E59F2", background: "rgba(110,89,242,0.08)" }}>
                      <svg viewBox="0 0 20 20" fill="none" width="17" height="17">{AI_ICONS[ex.icon]}</svg>
                    </span>
                    <span>
                      <span style={{ display: "block", fontSize: 14, fontWeight: 600, color: C.text900, lineHeight: "19px" }}>{ex.text}</span>
                      <span style={{ display: "block", fontSize: 12.5, color: C.text500, marginTop: 2 }}>{ex.hint}</span>
                    </span>
                  </button>
                ))}
              </div>
            )}

            {/* Thinking */}
            {aiState === "thinking" && (
              <div style={{ display: "flex", alignItems: "center", gap: 12, padding: "18px 4px", animation: "fadeIn .3s ease" }}>
                <span className="spin" style={{ width: 18, height: 18, borderRadius: "50%", border: "2.5px solid rgba(110,89,242,0.25)", borderTopColor: "#6E59F2", flex: "none" }} />
                <span style={{ fontSize: 14.5, color: C.text500 }}>Reading your request<span className="skl">…</span> matching against {tab === "video" ? `${clips.length} of ${firstName}'s clips` : `${reports.length} of ${firstName}'s reports`}.</span>
              </div>
            )}

            {/* AI overview */}
            {aiState === "done" && aiResult && (
              <div style={{ display: "flex", gap: 14, background: "linear-gradient(135deg, rgba(26,168,224,0.06), rgba(110,89,242,0.06))", border: "1px solid rgba(110,89,242,0.18)", borderRadius: 14, padding: "16px 18px", marginTop: 14, animation: "fadeIn .3s ease" }}>
                <span style={{ flex: "none", color: "#6E59F2", marginTop: 2 }}><Sparkle size={20} /></span>
                <div style={{ flex: 1 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
                    <span style={{ fontSize: 14, fontWeight: 700, color: C.text900 }}>AI overview</span>
                    <span style={{ fontSize: 11, fontWeight: 600, color: "#6E59F2", background: "rgba(110,89,242,0.1)", padding: "2px 8px", borderRadius: 9999 }}>Experimental</span>
                  </div>
                  <p style={{ fontSize: 14.5, color: C.text700, lineHeight: "21px", margin: 0 }}>{aiResult.summary}</p>
                  <div style={{ display: "flex", flexWrap: "wrap", alignItems: "center", gap: 8, marginTop: 12 }}>
                    {aiResult.intents.map((it) => (
                      <span key={it} style={{ display: "inline-flex", alignItems: "center", gap: 6, fontSize: 12.5, fontWeight: 600, color: "#5B47C9", background: "#fff", border: "1px solid rgba(110,89,242,0.25)", padding: "5px 11px", borderRadius: 9999 }}>
                        <span style={{ width: 6, height: 6, borderRadius: "50%", background: "#6E59F2" }} />{it}
                      </span>
                    ))}
                    <span style={{ fontSize: 12.5, color: C.text500 }}>{aiResult.items.length} {aiResult.kind === "clips" ? "clip" : "report"}{aiResult.items.length === 1 ? "" : "s"}</span>
                    <button onClick={resetAi} style={{ marginLeft: "auto", display: "flex", alignItems: "center", gap: 7, border: `1px solid ${C.borderGrey}`, background: "#fff", borderRadius: 9, padding: "6px 12px", fontFamily: FONT, fontSize: 13, fontWeight: 600, color: C.text700, cursor: "pointer" }}>
                      <svg viewBox="0 0 16 16" fill="none" width="13" height="13"><path d="M3 8 a5 5 0 1 1 1.5 3.5 M3 12 V8 H7" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" /></svg>
                      New search
                    </button>
                  </div>
                </div>
              </div>
            )}
          </>
        )}
      </div>
  );


  return (
    <main style={{ flex: 1, padding: "32px 40px 48px", overflow: "auto" }}>
      {/* Back link */}
      <button
        onClick={onBack}
        style={{ display: "inline-flex", alignItems: "center", gap: 8, border: "none", background: "transparent", cursor: "pointer", fontFamily: FONT, fontSize: 14, fontWeight: 600, color: C.text500, padding: 0, marginBottom: 20 }}
      >
        <svg viewBox="0 0 16 16" fill="none" width="16" height="16"><path d="M10 3 L5 8 L10 13" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" /></svg>
        Back to players
      </button>

      {/* Profile card */}
      {(() => {
        // Map a 1–5 rating to the shared [value, tone] bar format so readiness,
        // potential, technique and power all render with the same progress bar.
        const ratingTone = (r) => (r >= 4 ? "green" : "amber");
        const metrics = [
          { label: "Readiness", bar: [player.readiness * 20, ratingTone(player.readiness)], sub: player.readinessText },
          { label: "Potential", bar: [player.potential * 20, ratingTone(player.potential)], sub: player.potentialText },
          { label: "Technique", bar: player.technique, sub: null },
          { label: "Power", bar: player.power, sub: null },
        ];
        return (
          <div style={{ background: "#fff", border: `1px solid ${C.border}`, borderRadius: 16, padding: 28, marginBottom: 34 }}>
            {/* Identity row */}
            <div style={{ display: "flex", alignItems: "center", gap: 24 }}>
              <img src={photoSrc(player)} alt="" style={{ width: 140, height: 140, borderRadius: "50%", objectFit: "cover", background: "#d9d9d9", flex: "none" }} />
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 12, flexWrap: "wrap" }}>
                  <h1 style={{ fontSize: 26, fontWeight: 700, color: C.text900, letterSpacing: "-0.4px" }}>{player.name}</h1>
                  <span style={{ display: "inline-block", fontSize: 11, fontWeight: 700, letterSpacing: "0.4px", padding: "5px 11px", borderRadius: 9999, background: player.status === "short" ? "rgba(22,163,74,0.10)" : "#EBF1FF", color: player.status === "short" ? C.greenDark : "#6591FC" }}>{player.statusText}</span>
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap", marginTop: 8, fontSize: 14, color: C.text500 }}>
                  <span style={{ fontWeight: 600, color: C.text700 }}>Age {player.age}</span>
                  <span style={{ color: C.borderGrey }}>·</span>
                  <span>{player.role}</span>
                  <span style={{ color: C.borderGrey }}>·</span>
                  <span>{player.pathway}</span>
                </div>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginTop: 12 }}>
                  {player.archChips.map((c) => <span key={c} style={{ background: C.bgGrey, color: C.text700, fontSize: 13, fontWeight: 600, padding: "5px 12px", borderRadius: 9999 }}>{c}</span>)}
                </div>
              </div>
            </div>

            {/* Divider */}
            <div style={{ height: 1, background: C.border, margin: "24px 0" }} />

            {/* Metrics — consistent progress bars */}
            <div style={{ display: "grid", gridTemplateColumns: "repeat(2, minmax(0, 1fr))", columnGap: 40, rowGap: 22 }}>
              {metrics.map((m) => (
                <div key={m.label}>
                  <div style={{ display: "flex", alignItems: "baseline", justifyContent: "space-between", marginBottom: 8 }}>
                    <span style={{ fontSize: 13, fontWeight: 700, color: C.text700, textTransform: "uppercase", letterSpacing: "0.4px" }}>{m.label}</span>
                    {m.sub && <span style={{ fontSize: 12.5, color: C.text500, marginLeft: 12, textAlign: "right" }}>{m.sub}</span>}
                  </div>
                  <Bar value={m.bar} />
                </div>
              ))}
            </div>
          </div>
        );
      })()}


      {/* ---- Tabs: Video / Reports ---- */}
      <div style={{ display: "flex", alignItems: "center", gap: 4, borderBottom: `1px solid ${C.border}`, marginBottom: 24 }}>
        {[
          { key: "video", label: "Video", count: clips.length },
          { key: "reports", label: "Scout reports", count: reports.length },
        ].map((t) => {
          const on = tab === t.key;
          return (
            <button
              key={t.key}
              onClick={() => setTab(t.key)}
              style={{
                position: "relative", display: "inline-flex", alignItems: "center", gap: 8, border: "none", background: "transparent",
                cursor: "pointer", fontFamily: FONT, fontSize: 15, fontWeight: 600, padding: "12px 16px", marginBottom: -1,
                color: on ? C.text900 : C.text500, borderBottom: `2px solid ${on ? C.navy : "transparent"}`,
              }}
            >
              {t.label}
              <span style={{ fontSize: 12, fontWeight: 700, minWidth: 20, padding: "2px 7px", borderRadius: 9999, background: on ? C.navy : C.bgGrey, color: on ? "#fff" : C.text500 }}>{t.count}</span>
            </button>
          );
        })}
      </div>

      {/* ---- Video ---- */}
      {tab === "video" && (
      <div style={{ marginBottom: 38 }}>
        {searchBlock}
        {clips.length === 0 ? (
          <div style={{ border: `1px dashed ${C.borderGrey}`, borderRadius: 14, padding: "44px 24px", textAlign: "center", color: C.text500, fontSize: 15, background: C.bgGrey }}>
            No video has been uploaded for {player.name.split(" ")[0]} yet. Footage captured by scouts will appear here.
          </div>
        ) : (
          <div style={{ display: "grid", gridTemplateColumns: "minmax(0, 1.55fr) minmax(260px, 1fr)", gap: 22, alignItems: "start" }}>
            {/* Main player */}
            <div>
              <div style={{ position: "relative", borderRadius: 12, overflow: "hidden", background: "#0F1E36", aspectRatio: "16 / 9" }}>
                <video
                  ref={videoRef}
                  src={LOCAL_VIDEO}
                  controls
                  preload="metadata"
                  style={{ position: "absolute", inset: 0, width: "100%", height: "100%", background: "#0F1E36" }}
                >
                  Your browser can't play this video.
                </video>
                {activeMoment && (
                  <span style={{ position: "absolute", top: 12, left: 12, zIndex: 3, display: "inline-flex", alignItems: "center", gap: 6, fontSize: 11, fontWeight: 700, color: "#fff", background: EVENT[activeMoment.type].color, padding: "4px 10px", borderRadius: 9999, pointerEvents: "none" }}>
                    {EVENT[activeMoment.type].label} · {activeMoment.title}
                  </span>
                )}
              </div>
              {activeMoment && (
                <div style={{ marginTop: 14 }}>
                  <div style={{ fontSize: 16, fontWeight: 700, color: C.text900 }}>{activeMoment.title}</div>
                  <div style={{ fontSize: 12, color: C.text400, margin: "3px 0 6px" }}>Over {activeMoment.range} · {fmtClock(activeMoment.start)}–{fmtClock(activeMoment.end)}</div>
                  <div style={{ fontSize: 14, color: C.text500, lineHeight: "20px" }}>{activeMoment.note}</div>
                </div>
              )}
            </div>

            {/* Clip list */}
            <div className="cscroll" style={{ maxHeight: 460, overflowY: "auto", paddingRight: 6 }}>
              {displayClips.length === 0 ? (
                <div style={{ padding: "28px 12px", textAlign: "center", color: C.text500, fontSize: 14 }}>
                  No clips match your search. <span onClick={() => { setText(""); resetAi(); }} style={{ color: C.activeBlue, fontWeight: 600, cursor: "pointer" }}>Clear</span>
                </div>
              ) : displayClips.map((m) => {
                const isActive = m.id === activeClip;
                return (
                  <div
                    key={m.id}
                    onClick={() => playClip(m.id)}
                    className="clip-row"
                    style={{
                      display: "flex", gap: 12, padding: "10px 8px", borderRadius: 10, cursor: "pointer", marginBottom: 4,
                      background: isActive ? "rgba(26,168,224,0.08)" : "transparent",
                      border: isActive ? `1px solid rgba(26,168,224,0.4)` : "1px solid transparent",
                      transition: "background .15s",
                    }}
                  >
                    <div style={{ position: "relative", width: 84, height: 52, borderRadius: 8, overflow: "hidden", flex: "none", background: "#0F1E36" }}>
                      <div style={{ position: "absolute", inset: 0, background: "radial-gradient(circle at 50% 40%, #2a3b56, #0F1E36)" }} />
                      <span style={{ position: "absolute", top: 4, left: 4, width: 7, height: 7, borderRadius: "50%", background: EVENT[m.type].color }} />
                      <span style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center" }}>
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="rgba(255,255,255,.85)"><path d="M8 5 L19 12 L8 19 Z" /></svg>
                      </span>
                    </div>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <span style={{ fontSize: 14, fontWeight: 700, color: C.text900 }}>{m.title}</span>
                      <div style={{ fontSize: 11, color: C.text400, margin: "2px 0 3px" }}>Over {m.range} · {fmtClock(m.start)}–{fmtClock(m.end)}</div>
                      <div style={{ fontSize: 12, color: C.text500, lineHeight: "16px" }}>{m.note}</div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </div>
      )}

      {/* ---- Scout reports ---- */}
      {tab === "reports" && (
      <div style={{ marginBottom: 38 }}>
        {searchBlock}
        {reports.length === 0 ? (
          <div style={{ border: `1px dashed ${C.borderGrey}`, borderRadius: 14, padding: "44px 24px", textAlign: "center", color: C.text500, fontSize: 15, background: C.bgGrey }}>
            No scout reports have been completed on {player.name.split(" ")[0]} yet.
          </div>
        ) : (
          <div style={{ border: `1px solid ${C.border}`, borderRadius: 14, overflow: "hidden" }}>
            <table style={{ width: "100%", borderCollapse: "collapse" }}>
              <thead>
                <tr>
                  {["Fixture", "Scout", "Format", "Date", "Rating", ""].map((h, i) => (
                    <th key={i} style={{ textAlign: "left", fontSize: 13, fontWeight: 600, color: C.text500, padding: "16px 14px", paddingLeft: i === 0 ? 22 : 14, background: "#fff", borderBottom: `1px solid ${C.border}`, whiteSpace: "nowrap" }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {displayReports.length === 0 ? (
                  <tr>
                    <td colSpan={6} style={{ padding: "40px 24px", textAlign: "center", color: C.text500, fontSize: 15 }}>
                      No reports match your search. <span onClick={() => { setText(""); resetAi(); }} style={{ color: C.activeBlue, fontWeight: 600, cursor: "pointer" }}>Clear</span>
                    </td>
                  </tr>
                ) : displayReports.map((r) => (
                  <tr key={r.id} className="clip-row" onClick={() => onOpenReport(r.id)} style={{ cursor: "pointer", transition: "background .15s" }}>
                    <td style={{ padding: "16px 14px", paddingLeft: 22, borderBottom: `1px solid ${C.border}`, verticalAlign: "middle", fontSize: 14, fontWeight: 600, color: C.text900, minWidth: 200 }}>{r.fixture}</td>
                    <td style={{ padding: "16px 14px", borderBottom: `1px solid ${C.border}`, verticalAlign: "middle", fontSize: 14, color: C.text700, whiteSpace: "nowrap" }}>{r.scout}</td>
                    <td style={{ padding: "16px 14px", borderBottom: `1px solid ${C.border}`, verticalAlign: "middle" }}>
                      <span style={{ fontSize: 12, fontWeight: 700, letterSpacing: "0.4px", padding: "5px 11px", borderRadius: 9999, background: `${fmtColor[r.format]}14`, color: fmtColor[r.format] }}>{r.format}</span>
                    </td>
                    <td style={{ padding: "16px 14px", borderBottom: `1px solid ${C.border}`, verticalAlign: "middle", fontSize: 14, color: C.text700, whiteSpace: "nowrap" }}>{r.date}</td>
                    <td style={{ padding: "16px 14px", borderBottom: `1px solid ${C.border}`, verticalAlign: "middle" }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8, whiteSpace: "nowrap" }}>
                        <Stars rating={r.rating} />
                        <span style={{ fontSize: 14, fontWeight: 700, color: C.text900 }}>{r.rating.toFixed(1)}</span>
                      </div>
                    </td>
                    <td style={{ padding: "16px 14px", paddingRight: 22, borderBottom: `1px solid ${C.border}`, verticalAlign: "middle", textAlign: "right" }}>
                      <span style={{ color: C.text400, display: "inline-flex" }}>
                        <svg viewBox="0 0 18 18" fill="none" width="18" height="18"><path d="M7 4 L12 9 L7 14" stroke="currentColor" strokeWidth="1.6" /></svg>
                      </span>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>
      )}
    </main>
  );
}


function ScoutingPortal() {
  const [screen, setScreen] = useState("dashboard");
  const [selected, setSelected] = useState([]);
  const [detailId, setDetailId] = useState(null);
  const [reportOpen, setReportOpen] = useState(false);
  const [reportPhase, setReportPhase] = useState("loading"); // "loading" -> "open"

  // Open the report as a modal over whatever screen is currently showing.
  const openReport = () => {
    setReportPhase("loading");
    setReportOpen(true);
  };
  const closeReport = () => setReportOpen(false);

  useEffect(() => {
    if (!reportOpen || reportPhase !== "loading") return;
    const t = setTimeout(() => setReportPhase("open"), 2000);
    return () => clearTimeout(t);
  }, [reportOpen, reportPhase]);

  // Lock background scroll while the modal is open.
  useEffect(() => {
    document.body.style.overflow = reportOpen ? "hidden" : "";
    return () => { document.body.style.overflow = ""; };
  }, [reportOpen]);

  const toggle = (id) =>
    setSelected((prev) => {
      if (prev.includes(id)) return prev.filter((x) => x !== id);
      if (prev.length >= MAX_COMPARE) return prev;
      return [...prev, id];
    });

  const openPlayer = (id) => { setDetailId(id); setScreen("playerDetail"); };

  const navForScreen = { dashboard: "dashboard", players: "players", comparison: "players", playerDetail: "players", reportList: "reports" };
  const activeNav = navForScreen[screen] || "dashboard";

  return (
    <div style={{ fontFamily: FONT, color: C.text900, background: "#fff", minHeight: "100vh", WebkitFontSmoothing: "antialiased" }}>
      <div style={{ display: "flex", width: "100%", minHeight: "100vh", background: "#fff" }}>
        <Sidebar active={activeNav} onNavigate={(s) => { setReportOpen(false); setScreen(s); }} />
        {screen === "dashboard" && <Dashboard />}
        {screen === "players" && <PlayerManagement selected={selected} toggle={toggle} onCompare={() => setScreen("comparison")} onOpenPlayer={openPlayer} />}
        {screen === "comparison" && <PlayerComparison selected={selected} onRemove={(id) => setSelected((prev) => prev.filter((x) => x !== id))} />}
        {screen === "playerDetail" && <PlayerDetail playerId={detailId} onBack={() => setScreen("players")} onNavigate={setScreen} onOpenReport={() => openReport()} />}
        {screen === "reportList" && <ReportList onOpen={openReport} />}
      </div>
      {reportOpen && <PlayerReport phase={reportPhase} onClose={closeReport} />}
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<ErrorBoundary><ScoutingPortal /></ErrorBoundary>);
</script>
</body>
