* { box-sizing: border-box; margin: 0; padding: 0; }
body { background:#EEF0F2; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .45; } }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.skl { animation: pulse 1.1s ease-in-out infinite; }
.spin { animation: spin .9s linear infinite; }
.clip-row:hover { background: #F4F5F7 !important; }
button { transition: filter .15s; }

/* Custom scrollbars (reference: 18px track, navy thumb, chevron buttons) */
.cscroll { scrollbar-width: thin; scrollbar-color: #000B1C rgba(0,11,28,0.03); }
.cscroll::-webkit-scrollbar { width: 18px; }
.cscroll::-webkit-scrollbar-track { background: rgba(0,11,28,0.03); }
.cscroll::-webkit-scrollbar-thumb {
  background: #000B1C;
  border-radius: 1000px;
  border: 3px solid transparent;
  background-clip: padding-box;
  min-height: 60px;
}
.cscroll::-webkit-scrollbar-button:single-button {
  background-color: #fff;
  height: 18px;
  background-repeat: no-repeat;
  background-position: center;
  background-size: 8px 5px;
}
.cscroll::-webkit-scrollbar-button:single-button:vertical:decrement {
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='8' height='5' viewBox='0 0 8 5'><path d='M0.5 4.5 L4 0.5 L7.5 4.5' fill='none' stroke='%23171717' stroke-width='1.4' stroke-linecap='round' stroke-linejoin='round'/></svg>");
}
.cscroll::-webkit-scrollbar-button:single-button:vertical:increment {
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='8' height='5' viewBox='0 0 8 5'><path d='M0.5 0.5 L4 4.5 L7.5 0.5' fill='none' stroke='%23171717' stroke-width='1.4' stroke-linecap='round' stroke-linejoin='round'/></svg>");
}
.cscroll::-webkit-scrollbar-button:vertical:start:increment,
.cscroll::-webkit-scrollbar-button:vertical:end:decrement { display: none; }

/* Timeline scroller: scrollable but native bar hidden (we render a custom one) */
.hscroll { -ms-overflow-style: none; scrollbar-width: none; }
.hscroll::-webkit-scrollbar { width: 0; height: 0; display: none; }

<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useMemo, useRef, useEffect, useLayoutEffect } = React;

class ErrorBoundary extends React.Component {
  constructor(p){ super(p); this.state = { err: null, info: null }; }
  static getDerivedStateFromError(err){ return { err }; }
  componentDidCatch(err, info){ this.setState({ info }); }
  render(){
    if(this.state.err){
      return React.createElement('div', { style: { fontFamily: 'monospace', padding: 24, color: '#b91c1c', background:'#fff', whiteSpace:'pre-wrap', fontSize:13, lineHeight:'18px' } },
        'Render error (screen failed to load):\n\n' + String(this.state.err && this.state.err.stack || this.state.err) +
        '\n\n' + (this.state.info ? String(this.state.info.componentStack) : '')
      );
    }
    return this.props.children;
  }
}

const SCOUT_PHOTOS = {
  "Mike Patterson": "s1",   // ginger-haired man
  "Tom Clarke": "s2",       // grey-haired man, navy blazer
  "Raj Khanna": "s3",       // South Asian man
  "Sandra Mehta": "s4",     // woman, green blazer

/* Deterministic photo for arbitrary names (dashboard lists, scouts) so they
   aren't all identical silhouettes. Scouts use their assigned headshot; other
   names hash across the player PHOTOS pool (excluding the scout headshots). */
const PHOTO_KEYS = Object.keys(PHOTOS).filter((k) => !/^s[0-9]+$/.test(k));
function photoForName(name) {
  if (SCOUT_PHOTOS[name]) return PHOTOS[SCOUT_PHOTOS[name]];
  let h = 0;
  for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) >>> 0;
  return PHOTOS[PHOTO_KEYS[h % PHOTO_KEYS.length]];
}

/* Example natural-language prompts surfaced to inspire scouts to search by
   intent rather than by name/age. Each pairs a headline prompt with a one-line
   description of what it does. */
const AI_EXAMPLES = [
  { icon: "trophy", text: "Build me a dream team to compete at Lord's", hint: "Balanced XI weighted for Test-format temperament" },
  { icon: "spark", text: "Who could open the batting in a T20 and clear the ropes?", hint: "Aggressive top-order power hitters" },
  { icon: "rise", text: "Find raw teenagers with generational ceilings worth a long-term bet", hint: "Young players, highest potential, lower readiness" },
  { icon: "shield", text: "Show me the most match-ready all-rounders for the senior squad", hint: "Starting-XI-ready, all-rounder archetypes" },
];

/* Lightweight keyword "intent" matcher. Reads the free-text query, infers what
   the scout is after, scores every player, and returns a ranked, explained
   result set. This stands in for a real LLM call in the prototype. */
function aiSearch(query) {
  const q = (query || "").toLowerCase();
  const has = (...words) => words.some((w) => q.includes(w));

  const intents = [];
  let scorer = null;
  let summary = "";

  const wantsYoung = has("teen", "young", "youngster", "raw", "16", "17", "academy", "future", "long-term", "long term", "prospect");
  const wantsPower = has("power", "clear the ropes", "ropes", "boundary", "aggressive", "hitter", "explosive", "attack", "t20", "white-ball", "white ball");
  const wantsReady = has("ready", "match-ready", "match ready", "senior", "starting xi", "xi", "now", "established", "lord", "test", "compete");
  const wantsPotential = has("potential", "ceiling", "generational", "elite", "franchise", "star", "best");
  const wantsAllrounder = has("all-rounder", "all rounder", "allrounder", "balance", "balanced", "team", "squad", "xi", "dream team");
  const wantsTechnique = has("technique", "anchor", "consistent", "solid", "orthodox", "classical", "defence", "defend");

  if (has("dream team", "build", "xi", "squad", "team", "lord", "compete")) {
    intents.push("Assemble a balanced, competitive squad");
    summary = "Reading this as a request for a balanced, competition-ready group rather than a single player. I've leaned toward higher readiness and potential, mixing batting, all-round and bowling archetypes so the side has depth across disciplines — the kind of blend you'd want walking out at Lord's.";
    scorer = (p) => p.readiness * 1.4 + p.potential * 1.2 + (p.archetype.includes("All-rounder") || p.role.includes("All-rounder") ? 1.5 : 0) + (p.power[0] + p.technique[0]) / 100;
  } else if (wantsYoung && wantsPotential) {
    intents.push("Young age", "Highest potential", "Long-term bet");
    summary = "Interpreting this as a hunt for high-ceiling youth — players you'd invest in for the long term. I've prioritised the youngest players carrying the strongest potential ratings, accepting lower present-day readiness as the trade-off for upside.";
    scorer = (p) => p.potential * 2 + (20 - p.age) * 0.6 - p.readiness * 0.3;
  } else if (wantsPower) {
    intents.push("Power & aggressive intent", "Top-order / opening");
    summary = "Treating this as a search for explosive, boundary-hitting batters who can change a game quickly. I've ranked on raw power scores first, then favoured opening and top-order roles suited to that aggressive intent.";
    scorer = (p) => p.power[0] / 20 + (p.role.toLowerCase().includes("open") || p.archetype.toLowerCase().includes("power") || p.archetype.includes("360") ? 2 : 0) + p.potential * 0.4;
  } else if (wantsReady && wantsAllrounder) {
    intents.push("Match-ready", "All-rounder");
    summary = "Reading this as a need for dependable, senior-ready all-rounders rather than projects. I've filtered toward the highest readiness ratings and rewarded genuine all-round profiles that could slot into a senior side immediately.";
    scorer = (p) => p.readiness * 2 + (p.archetype.includes("All-rounder") || p.role.includes("All-rounder") ? 2.5 : 0) + p.potential * 0.5;
  } else if (wantsReady) {
    intents.push("Match-ready", "Senior squad");
    summary = "Interpreting this as a request for players who can contribute now. I've ranked by present-day readiness, using potential and core attributes as tie-breakers.";
    scorer = (p) => p.readiness * 2 + p.potential * 0.6 + (p.technique[0] + p.power[0]) / 80;
  } else if (wantsTechnique) {
    intents.push("Technical quality", "Anchor / top-order");
    summary = "Reading this as a search for technically sound batters who can hold an innings together. I've ranked on technique scores and favoured anchor and top-order roles.";
    scorer = (p) => p.technique[0] / 18 + (p.role.toLowerCase().includes("anchor") || p.archetype.toLowerCase().includes("anchor") || p.role.toLowerCase().includes("top-order") ? 1.5 : 0);
  } else {
    intents.push("Best overall prospects");
    summary = "I couldn't tie this to a specific profile, so I've returned the strongest all-round prospects — weighing potential, readiness and core attributes together. Try describing a scenario (a format, a role, a ceiling) for a sharper shortlist.";
    scorer = (p) => p.potential * 1.2 + p.readiness * 1.1 + (p.technique[0] + p.power[0]) / 90;
  }

  const ranked = [...PLAYERS]
    .map((p) => ({ player: p, score: scorer(p) }))
    .sort((a, b) => b.score - a.score)
    .slice(0, 5);

  return { intents, summary, ranked: ranked.map((r) => r.player) };
}

/* Per-player one-line rationale for why the AI surfaced them. */
function aiReason(p) {
  const bits = [];
  if (p.potential >= 5) bits.push("top-tier ceiling");
  else if (p.potential >= 4) bits.push("strong upside");
  if (p.readiness >= 5) bits.push("senior-ready");
  else if (p.readiness <= 3) bits.push("a longer-term project");
  if (p.power[1] === "green") bits.push("genuine power");
  if (p.technique[1] === "green") bits.push("sound technique");
  if (p.age <= 17) bits.push(`only ${p.age}`);
  return bits.length ? bits.slice(0, 3).join(", ") : p.role.toLowerCase();
}

/* Sparkle mark used for the AI Mode affordances */
const Sparkle = ({ size = 16, color = "currentColor" }) => (
  <svg viewBox="0 0 20 20" width={size} height={size} fill="none">
    <path d="M10 2 L11.6 7.4 L17 9 L11.6 10.6 L10 16 L8.4 10.6 L3 9 L8.4 7.4 Z" fill={color} />
    <path d="M15.5 13 L16.2 15 L18 15.6 L16.2 16.2 L15.5 18.2 L14.8 16.2 L13 15.6 L14.8 15 Z" fill={color} opacity="0.7" />
  </svg>
);

function PlayerManagement({ selected, toggle, onCompare, onOpenPlayer }) {
  const n = selected.length;
  const canCompare = n >= 2;
  const atMax = n >= MAX_COMPARE;
  const hint = n === 0 ? "Select players to compare" : n === 1 ? "1 selected — select at least one more" : `${n} selected`;

  const [mode, setMode] = useState("standard"); // "standard" | "ai"
  const [text, setText] = useState("");          // standard search box
  const [aiQuery, setAiQuery] = useState("");     // AI input value
  const [aiState, setAiState] = useState("idle"); // "idle" | "thinking" | "done"
  const [aiResult, setAiResult] = useState(null);
  const aiTimer = useRef(null);

  useEffect(() => () => clearTimeout(aiTimer.current), []);

  const runAi = (q) => {
    const query = (q != null ? q : aiQuery).trim();
    if (!query) return;
    setAiQuery(query);
    setAiState("thinking");
    setAiResult(null);
    clearTimeout(aiTimer.current);
    aiTimer.current = setTimeout(() => {
      setAiResult(aiSearch(query));
      setAiState("done");
    }, 1600);
  };

  const resetAi = () => { setAiState("idle"); setAiResult(null); setAiQuery(""); };

  const Chip = ({ children }) => (
    <span style={{ border: `1px solid ${C.borderGrey}`, borderRadius: 9, padding: "8px 12px", fontSize: 14, color: C.text700, background: "#fff", display: "inline-flex", alignItems: "center", gap: 8 }}>
      {children}
      <svg viewBox="0 0 14 14" fill="none" width="14" height="14"><path d="M3 5 L7 9 L11 5" stroke={C.text400} strokeWidth="1.4" /></svg>
    </span>
  );

  // rows for standard mode honour the text query
  const stdRows = useMemo(() => {
    const q = text.trim().toLowerCase();
    if (!q) return PLAYERS;
    return PLAYERS.filter((p) =>
      [p.name, p.archetype, p.role, p.readinessText, p.potentialText, ...p.archChips]
        .join(" ").toLowerCase().includes(q)
    );
  }, [text]);

  const PlayerRow = ({ p, reason }) => {
    const checked = selected.includes(p.id);
    const disabled = !checked && atMax;
    return (
      <tr key={p.id}>
        <td style={{ padding: "16px 14px", paddingLeft: 22, borderBottom: `1px solid ${C.border}`, verticalAlign: "middle" }}>
          <label style={{ display: "inline-flex", cursor: disabled ? "not-allowed" : "pointer", position: "relative" }}>
            <input type="checkbox" checked={checked} disabled={disabled} onChange={() => toggle(p.id)} style={{ position: "absolute", opacity: 0, width: 18, height: 18, margin: 0, cursor: disabled ? "not-allowed" : "pointer" }} />
            <span style={{ width: 18, height: 18, border: `1.5px solid ${checked ? C.navy : C.borderGrey}`, borderRadius: 5, background: checked ? C.navy : "#fff", display: "inline-block", position: "relative", opacity: disabled ? 0.4 : 1 }}>
              {checked && <span style={{ position: "absolute", left: 5, top: 2, width: 4, height: 8, border: "solid #fff", borderWidth: "0 2px 2px 0", transform: "rotate(45deg)" }} />}
            </span>
          </label>
        </td>
        <td style={{ padding: "16px 14px", borderBottom: `1px solid ${C.border}`, verticalAlign: "middle", minWidth: 220 }}>
          <div onClick={() => onOpenPlayer && onOpenPlayer(p.id)} className="clip-row" style={{ display: "flex", alignItems: "center", gap: 14, cursor: onOpenPlayer ? "pointer" : "default", borderRadius: 8, margin: "-6px -8px", padding: "6px 8px", transition: "background .15s" }}>
            <img src={photoSrc(p)} alt="" style={{ width: 40, height: 40, borderRadius: "50%", objectFit: "cover", background: "#d9d9d9", flex: "none" }} />
            <div>
              <span style={{ fontWeight: 600, color: C.text900, fontSize: 15, whiteSpace: "nowrap", display: "block" }}>{p.name}</span>
              {reason && <span style={{ display: "flex", alignItems: "center", gap: 5, fontSize: 12.5, color: C.activeBlue, marginTop: 3 }}><Sparkle size={12} color={C.activeBlue} />{reason}</span>}

          </div>
        </td>
        <td style={{ padding: "16px 14px", borderBottom: `1px solid ${C.border}`, verticalAlign: "middle", fontSize: 14, color: C.text700 }}>{p.age}</td>
        <td style={{ padding: "16px 14px", borderBottom: `1px solid ${C.border}`, verticalAlign: "middle" }}>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>

          <div style={{ border: `1px solid ${C.border}`, borderRadius: 14, overflow: "hidden" }}>
            <table style={{ width: "100%", borderCollapse: "collapse" }}>

              <span style={{ fontSize: 14, color: C.text500 }}>Showing {stdRows.length} of {PLAYERS.length} players</span>

                <span style={{ display: "flex", alignItems: "center", gap: 6 }}><svg viewBox="0 0 16 16" fill="none" width="16" height="16"><path d="M10 3 L5 8 L10 13" stroke="currentColor" strokeWidth="1.5" /></svg> Previous</span>

                    <span>
                      <span style={{ display: "block", fontSize: 14.5, fontWeight: 600, color: C.text900, lineHeight: "20px" }}>{ex.text}</span>

          )}

          {aiState === "thinking" && (
            <div style={{ display: "flex", alignItems: "center", gap: 12, padding: "22px 4px", animation: "fadeIn .3s ease" }}>

                Reading your request<span className="skl">…</span> matching {PLAYERS.length} players against intent, readiness and potential.

          {/* Results */}
          {aiState === "done" && aiResult && (
            <div style={{ animation: "fadeIn .3s ease" }}>

  const track = tone === "green" ? "#CCF3D8" : "#FFE6BA";

  const valColor = tone === "green" ? C.green : C.amber;
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 14, width: "100%" }}>
      <div style={{ flex: 1, height: 8, borderRadius: 9999, position: "relative", overflow: "hidden" }}>

      </div>
      <span style={{ fontSize: 15, fontWeight: 700, minWidth: 24, textAlign: "right", color: valColor }}>{val}</span>
    </div>

}

/* ---------------- Comparison AI ---------------- */

/* Example questions to inspire scouts to interrogate the comparison rather
   than just read the grid. Shown as tappable chips. */
const COMPARE_EXAMPLES = [
  { icon: "trophy", text: "Who's the best long-term investment here?" },
  { icon: "rise", text: "Which player has the highest ceiling if we're patient?" },
  { icon: "shield", text: "Who could step into the senior side right now?" },
  { icon: "spark", text: "Which two would form the best opening partnership?" },
];

/* Heuristic analyst over the currently-selected players. Reads the question,
   infers what's being asked, and builds a verdict + reasoning grounded in the
   real player attributes. Stands in for a live model call in the prototype. */
function compareAnalyse(players, question) {
  const q = (question || "").toLowerCase();
  const has = (...w) => w.some((x) => q.includes(x));
  const byName = (p) => p.name;
  const top = (scoreFn) => [...players].sort((a, b) => scoreFn(b) - scoreFn(a));

  // helpers
  const overall = (p) => p.readiness * 1.1 + p.potential * 1.2 + (p.technique[0] + p.power[0]) / 90;
  const fmtList = (arr) => arr.length <= 1 ? (arr[0] || "") : arr.slice(0, -1).join(", ") + " and " + arr[arr.length - 1];

  let heading = "Analysis";
  let pick = null;        // {player, line}
  let body = "";
  let runners = [];       // [{player, note}]

  if (has("invest", "long-term", "long term", "patient", "future", "develop", "project")) {
    heading = "Best long-term investment";
    const ranked = top((p) => p.potential * 2 + (22 - p.age) * 0.5 - p.readiness * 0.2);
    const w = ranked[0];
    pick = { player: w, line: `${w.name} is the strongest long-term bet.` };
    body = `At ${w.age} with a ${w.potentialText.toLowerCase()} projection, ${w.name.split(" ")[0]} carries the most upside relative to age. ${w.readiness <= 3 ? "Readiness is still developing, which is the trade-off — this is a hold-and-grow profile rather than an immediate contributor." : "Encouragingly, the ceiling comes without sacrificing present-day readiness."}`;
    runners = ranked.slice(1, 3).map((p) => ({ player: p, note: `${p.age} yrs · ${p.potentialText}` }));
  } else if (has("ceiling", "highest potential", "upside", "best player", "most talented", "star")) {
    heading = "Highest ceiling";
    const ranked = top((p) => p.potential * 2.5 + (p.technique[0] + p.power[0]) / 100);
    const w = ranked[0];
    pick = { player: w, line: `${w.name} has the highest ceiling of this group.` };
    body = `${w.name.split(" ")[0]} is rated ${w.potentialText.toLowerCase()} — the top projection among those compared — underpinned by ${w.power[1] === "green" ? "genuine power" : "developing power"} and ${w.technique[1] === "green" ? "sound technique" : "technique still being refined"}. Whether that ceiling is reached will hinge on development pathway and exposure.`;
    runners = ranked.slice(1, 3).map((p) => ({ player: p, note: p.potentialText }));
  } else if (has("now", "ready", "senior", "step in", "starting", "immediately", "today")) {
    heading = "Most match-ready now";
    const ranked = top((p) => p.readiness * 2.5 + p.potential * 0.4);
    const w = ranked[0];
    pick = { player: w, line: `${w.name} is the most ready to contribute now.` };
    body = `With a readiness rating of ${w.readiness}/5 (${w.readinessText.toLowerCase()}), ${w.name.split(" ")[0]} is closest to senior cricket among this group. ${ranked[1] ? `${ranked[1].name} is the next most ready, but sits a step behind on present-day readiness.` : ""}`;
    runners = ranked.slice(1, 3).map((p) => ({ player: p, note: p.readinessText }));
  } else if (has("opening", "open the", "partnership", "pair", "two ", "top order", "top-order")) {
    heading = "Best opening / top-order pairing";
    // favour high technique + power, prefer opener/top-order roles
    const ranked = top((p) => p.technique[0] / 14 + p.power[0] / 16 + (/(open|top-order|top order|anchor)/i.test(p.role + p.archetype) ? 3 : 0));
    const pair = ranked.slice(0, 2);
    pick = { player: pair[0], line: `${fmtList(pair.map(byName))} look the best top-order pairing.` };
    const a = pair[0], b = pair[1] || pair[0];
    body = `${a.name.split(" ")[0]} brings ${a.power[1] === "green" ? "the boundary-hitting intent" : "control at the top"}, complemented by ${b.name.split(" ")[0]}'s ${b.technique[1] === "green" ? "technical solidity to anchor the innings" : "ability to rotate and build"}. The blend of intent and stability is what makes the pair work.`;
    runners = pair.map((p) => ({ player: p, note: `${p.role}` }));
  } else if (has("weak", "concern", "risk", "worst", "avoid", "drop")) {
    heading = "Where the risk sits";
    const ranked = top((p) => -(p.readiness + p.potential));
    const w = ranked[0];
    pick = { player: w, line: `${w.name} carries the most question marks in this group.` };
    body = `On the combined readiness and potential picture, ${w.name.split(" ")[0]} sits behind the others here — ${w.readinessText.toLowerCase()} with a ${w.potentialText.toLowerCase()} projection. That doesn't rule them out, but among these specific names they're the higher-risk hold.`;
    runners = ranked.slice(1, 3).map((p) => ({ player: p, note: `${p.readinessText}` }));
  } else if (has("power", "aggress", "hit", "explosive", "t20", "boundary")) {
    heading = "Most power & aggression";
    const ranked = top((p) => p.power[0]);
    const w = ranked[0];
    pick = { player: w, line: `${w.name} offers the most power in this group.` };
    body = `${w.name.split(" ")[0]} tops the group for raw power${w.power[1] === "green" ? ", rated as a genuine strength" : ""}, making them the most likely to change a game quickly through the gears in white-ball phases.`;
    runners = ranked.slice(1, 3).map((p) => ({ player: p, note: `Power ${p.power[0]}` }));
  } else if (has("technique", "technical", "consistent", "solid", "defend", "defence")) {
    heading = "Most technically sound";
    const ranked = top((p) => p.technique[0]);
    const w = ranked[0];
    pick = { player: w, line: `${w.name} is the most technically sound here.` };
    body = `${w.name.split(" ")[0]} leads the group on technique${w.technique[1] === "green" ? ", rated a clear strength" : ""}, suggesting the most reliable method against quality bowling across formats.`;
    runners = ranked.slice(1, 3).map((p) => ({ player: p, note: `Technique ${p.technique[0]}` }));
  } else {
    heading = "Overall verdict";
    const ranked = top(overall);
    const w = ranked[0];
    pick = { player: w, line: `${w.name} grades out strongest overall.` };
    body = `Weighing readiness, potential and core attributes together, ${w.name.split(" ")[0]} edges this group — ${w.readinessText.toLowerCase()} with a ${w.potentialText.toLowerCase()} ceiling. ${ranked[1] ? `${ranked[1].name} is the closest challenger.` : ""} Ask a sharper question — about readiness, ceiling, power, technique or a specific role — for a more targeted read.`;
    runners = ranked.slice(1, 3).map((p) => ({ player: p, note: `${p.readinessText} · ${p.potentialText}` }));
  }

  return { heading, pick, body, runners };
}

function PlayerComparison({ selected, onRemove }) {
  const players = useMemo(() => selected.map((id) => PLAYERS.find((p) => p.id === id)).filter(Boolean).slice(0, MAX_COMPARE), [selected]);
  const cols = players.length;

  // AI interrogation state
  const [showAi, setShowAi] = useState(false);
  const [aiQ, setAiQ] = useState("");
  const [aiState, setAiState] = useState("idle"); // idle | thinking | done
  const [aiAns, setAiAns] = useState(null);
  const aiTimer = useRef(null);
  const aiPanelRef = useRef(null);
  useEffect(() => () => clearTimeout(aiTimer.current), []);
  // reset the answer if the selected players change
  useEffect(() => { setAiState("idle"); setAiAns(null); }, [selected.join(",")]);
  // when the panel opens, bring it into view
  useEffect(() => {
    if (showAi && aiPanelRef.current) {
      aiPanelRef.current.scrollIntoView({ behavior: "smooth", block: "nearest" });
    }
  }, [showAi]);

  const askAi = (q) => {
    const question = (q != null ? q : aiQ).trim();
    if (!question) return;
    setAiQ(question);
    setAiState("thinking");
    setAiAns(null);
    clearTimeout(aiTimer.current);
    aiTimer.current = setTimeout(() => {
      setAiAns(compareAnalyse(players, question));
      setAiState("done");
    }, 1500);
  };

  const Chip = ({ children }) => <span style={{ background: C.bgGrey, color: C.text700, fontSize: 14, padding: "6px 14px", borderRadius: 9999 }}>{children}</span>;

  const LABEL_W = 150;   // sticky label column width
  const MIN_COL = 170;   // min player column width before horizontal scroll kicks in

  const labelStyle = { position: "sticky", left: 0, zIndex: 2, background: "#fff", width: LABEL_W, padding: "18px 22px", fontSize: 14, color: C.text700, borderRight: `1px solid ${C.border}`, borderBottom: `1px solid ${C.border}`, display: "flex", alignItems: "center" };
  const cellStyle = { minWidth: 0, padding: "18px 20px", borderRight: `1px solid ${C.border}`, borderBottom: `1px solid ${C.border}`, display: "flex", alignItems: "center" };
  const groupStyle = { position: "sticky", left: 0, zIndex: 2, gridColumn: "1 / -1", background: C.bgGrey, borderTop: `1px solid ${C.border}`, borderBottom: `1px solid ${C.border}`, padding: "11px 22px", fontSize: 14, color: C.text500 };

  const rows = [
    { group: "Overview" },
    { label: "Age", render: (p) => <span style={{ fontSize: 16, fontWeight: 700, color: C.text900 }}>{p.age}</span> },
    { label: "Pathway", render: (p) => <Chip>{p.pathway}</Chip> },
    { label: "Role", render: (p) => <Chip>{p.role}</Chip> },
    { label: "Archetype", render: (p) => <Chip>{p.archetype}</Chip> },
    { group: "Development" },
    { label: "Readiness", render: (p) => <Dots on={p.readiness} /> },
    { label: "Potential", render: (p) => <Dots on={p.potential} /> },
    { group: "Attributes" },
    { label: "Technique", render: (p) => <Bar value={p.technique} /> },
    { label: "Power", render: (p) => <Bar value={p.power} /> },
  ];

  return (
    <main style={{ flex: 1, padding: "32px 40px 48px", overflow: "auto" }}>
      <PageHead title="Player Comparison" sub="Compare up to 10 players side-by-side across all scouting attributes">

          <span style={{ fontSize: 14, color: C.text500 }}>Clear all</span>

            <Sparkle size={15} /> {showAi ? "Hide AI" : "Ask AI"}

                  onChange={(e) => setAiQ(e.target.value)}
                  onKeyDown={(e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); askAi(); } }}

                </button>

                    <span style={{ flex: "none", width: 30, height: 30, borderRadius: 9, display: "flex", alignItems: "center", justifyContent: "center", color: "#6E59F2", background: "rgba(110,89,242,0.08)" }}>

              <span style={{ fontSize: 14.5, color: C.text500 }}>Weighing {cols} players across readiness, potential and attributes<span className="skl">…</span></span>
            </div>
          )}

          {/* Answer */}
          {aiState === "done" && aiAns && (
            <div style={{ marginTop: 16, display: "flex", gap: 14, background: "linear-gradient(135deg, rgba(26,168,224,0.06), rgba(110,89,242,0.06))", border: "1px solid rgba(110,89,242,0.18)", borderRadius: 14, padding: "18px 20px", animation: "fadeIn .3s ease" }}>

                {aiAns.pick && (
                  <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>

                  <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginTop: 12 }}>

        ) : (

          <div style={{ display: "grid", gridTemplateColumns: `${LABEL_W}px repeat(${cols}, minmax(${MIN_COL}px, 1fr))`, width: "100%", minWidth: "fit-content" }}>
            <div style={{ position: "sticky", left: 0, zIndex: 3, background: C.bgGrey, borderRight: `1px solid ${C.border}`, width: LABEL_W }} />

              <div key={p.id} style={{ position: "relative", minWidth: 0, background: "#fff", borderRight: `1px solid ${C.border}`, padding: "30px 20px 26px", display: "flex", flexDirection: "column", alignItems: "center" }}>

                <span style={{ fontSize: 12, fontWeight: 700, letterSpacing: "0.4px", padding: "6px 14px", borderRadius: 9999, whiteSpace: "nowrap", background: p.status === "short" ? "rgba(22,163,74,0.10)" : "#EBF1FF", color: p.status === "short" ? C.greenDark : "#6591FC" }}>{p.statusText}</span>
              </div>
            ))}

            {rows.map((r, idx) =>
              r.group ? (
                <div key={`g${idx}`} style={groupStyle}>{r.group}</div>
              ) : (
                <React.Fragment key={`r${idx}`}>
                  <div style={labelStyle}>{r.label}</div>
                  {players.map((p) => <div key={p.id} style={cellStyle}>{r.render(p)}</div>)}
                </React.Fragment>
              )
            )}
          </div>
          </div>
        )}
      </div>
    </main>
  );
}

function fmtClock(s) {
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${m}:${String(sec).padStart(2, "0")}`;
}

/* ---- small atoms ---- */

function Stars({ rating }) {
  const full = Math.floor(rating);
  const half = rating - full >= 0.5;
  return (
    <span style={{ display: "inline-flex", gap: 3, alignItems: "center" }}>
      {[0, 1, 2, 3, 4].map((i) => {
        const fillType = i < full ? "full" : i === full && half ? "half" : "empty";
        const gid = `star-${i}`;
        return (
          <svg key={i} viewBox="0 0 20 20" width="18" height="18">
            {fillType === "half" && (
              <defs>
                <linearGradient id={gid}>
                  <stop offset="50%" stopColor="#F6B748" />
                  <stop offset="50%" stopColor="#E5E7EB" />
                </linearGradient>
              </defs>
            )}
            <path
              d="M10 2 L12.4 7.2 L18 7.9 L13.8 11.7 L15 17.4 L10 14.5 L5 17.4 L6.2 11.7 L2 7.9 L7.6 7.2 Z"
              fill={fillType === "full" ? "#F6B748" : fillType === "half" ? `url(#${gid})` : "#E5E7EB"}
            />
          </svg>
        );
      })}
    </span>
  );
}

function FilterPill({ active, color, label, count, onClick }) {
  return (
    <button
      onClick={onClick}
      style={{
        display: "inline-flex", alignItems: "center", gap: 8, padding: "7px 14px", borderRadius: 9999,
        border: `1px solid ${active ? "transparent" : C.borderGrey}`,
        background: active ? (color || C.navy) : "#fff",
        color: active ? "#fff" : C.text700, fontSize: 13, fontWeight: 600, cursor: "pointer",
        fontFamily: FONT, transition: "all .15s",
      }}
    >
      {color && <span style={{ width: 8, height: 8, borderRadius: "50%", background: active ? "#fff" : color }} />}
      {label}
      {typeof count === "number" && <span style={{ opacity: 0.7, fontWeight: 500 }}>{count}</span>}
    </button>
  );
}

/* ---- main screen ---- */

const SCALE_LABELS = ["Below", "Slightly below", "In line with peers", "Very good", "Outstanding"];
function ratingColor(r) {
  if (r <= 2) return "#E0A02E";
  if (r === 3) return "#64748B";
  if (r === 4) return "#1AA8E0";
  return "#16A34A";
}
function PeerScale({ label, rating, clips, onViewClips }) {
  const color = ratingColor(rating);
  return (
    <div style={{ display: "grid", gridTemplateColumns: "170px 1fr 34px", alignItems: "center", gap: 12, padding: "9px 0" }}>
      <span style={{ fontSize: 13.5, color: C.text700 }}>{label}</span>
      <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
        <div style={{ flex: 1, display: "flex", gap: 4 }}>
          {[1, 2, 3, 4, 5].map((step) => (
            <span
              key={step}
              title={SCALE_LABELS[rating - 1]}
              style={{
                flex: 1, height: 6, borderRadius: 9999,
                background: step <= rating ? color : "#E8EAED",
                transition: "background .3s ease",
              }}
            />
          ))}
        </div>
      </div>
      <span style={{ display: "flex", justifyContent: "flex-end" }}>
        {clips && clips.length > 0 && <ClipBadge ids={clips} onViewClips={onViewClips} />}
      </span>
    </div>
  );
}

/* ---- Scout report — 9-section tabbed view ---- */

/* shared block renderers, driven by SECTIONS data */
function ClipBadge({ ids, onViewClips, style }) {
  if (!ids || !ids.length || !onViewClips) return null;
  return (
    <button
      onClick={(e) => { e.stopPropagation(); onViewClips(ids); }}
      title={`View ${ids.length} supporting clip${ids.length > 1 ? "s" : ""}`}
      style={{
        display: "inline-flex", alignItems: "center", gap: 4, padding: "2px 8px 2px 6px", borderRadius: 9999,
        border: `1px solid ${C.borderGrey}`, background: "#fff", color: C.activeBlue, fontSize: 12, fontWeight: 700,
        cursor: "pointer", fontFamily: FONT, lineHeight: 1, flex: "none", ...(style || {}),
      }}
    >
      <svg viewBox="0 0 16 16" width="11" height="11" fill="currentColor"><path d="M4 3 L13 8 L4 13 Z" /></svg>
      {ids.length}
    </button>
  );
}

function ReportNote({ text }) {
  return <p style={{ fontSize: 13.5, color: C.text500, lineHeight: "20px", marginTop: 10 }}>{text}</p>;
}

function ScaleGroup({ title, attrs, flags, onViewClips }) {
  return (
    <div style={{ marginBottom: 6 }}>
      {title && <div style={{ fontSize: 13, fontWeight: 700, color: C.text700, marginBottom: 4 }}>{title}</div>}
      <div style={{ display: "flex", flexDirection: "column" }}>
        {attrs.map((a) => <PeerScale key={a.label} label={a.label} rating={a.rating} clips={a.clips} onViewClips={onViewClips} />)}
      </div>
      {flags && flags.length > 0 && (
        <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginTop: 12 }}>
          {flags.map((f) => (
            <span key={f.q} style={{ fontSize: 12.5, color: C.text700, background: C.bgGrey, borderRadius: 8, padding: "6px 12px" }}>
              {f.q} <strong style={{ color: C.text900 }}>{f.a}</strong>
            </span>
          ))}
        </div>
      )}
    </div>
  );
}

function FactList({ title, items }) {
  return (
    <div style={{ marginBottom: 4 }}>
      {title && <div style={{ fontSize: 13, fontWeight: 700, color: C.text700, marginBottom: 8 }}>{title}</div>}
      <div style={{ border: `1px solid ${C.border}`, borderRadius: 10, overflow: "hidden" }}>
        {items.map((it, i) => (
          <div key={it.q} style={{ display: "grid", gridTemplateColumns: "200px 1fr", gap: 16, padding: "11px 14px", background: i % 2 ? C.bgGrey : "#fff", borderBottom: i === items.length - 1 ? "none" : `1px solid ${C.border}` }}>
            <span style={{ fontSize: 13, color: C.text500 }}>{it.q}</span>
            <span style={{ fontSize: 13.5, color: C.text900, fontWeight: 500 }}>{it.a}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function SuperTag({ text, label, clips, onViewClips }) {
  return (
    <div style={{ display: "flex", gap: 8, alignItems: "flex-start", marginTop: 12, background: "rgba(22,163,74,0.08)", border: "1px solid rgba(22,163,74,0.25)", borderRadius: 10, padding: "10px 12px" }}>
      <span style={{ fontSize: 11, fontWeight: 700, letterSpacing: ".4px", color: C.greenDark, background: "#fff", border: "1px solid rgba(22,163,74,0.3)", borderRadius: 6, padding: "3px 7px", flex: "none", marginTop: 1 }}>{label || "SUPER-STRENGTH"}</span>
      <span style={{ fontSize: 13.5, color: C.text700, lineHeight: "19px" }}>
        {text}
        {clips && clips.length > 0 && <span style={{ marginLeft: 8, verticalAlign: "middle" }}><ClipBadge ids={clips} onViewClips={onViewClips} /></span>}
      </span>
    </div>
  );
}

function SuperWeak({ title, strength, weakness, justification, strengthClips, weaknessClips, onViewClips }) {
  return (
    <div style={{ marginBottom: 4 }}>
      {title && <div style={{ fontSize: 13, fontWeight: 700, color: C.text700, marginBottom: 8 }}>{title}</div>}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 12 }}>
        <div style={{ background: "rgba(22,163,74,0.08)", border: "1px solid rgba(22,163,74,0.25)", borderRadius: 10, padding: "12px 14px" }}>
          <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: ".4px", color: C.greenDark, marginBottom: 6 }}>SUPER-STRENGTH</div>
          <div style={{ fontSize: 13.5, color: C.text700, lineHeight: "19px" }}>{strength}</div>
          {strengthClips && strengthClips.length > 0 && <div style={{ marginTop: 8 }}><ClipBadge ids={strengthClips} onViewClips={onViewClips} /></div>}
        </div>
        <div style={{ background: "rgba(224,160,46,0.10)", border: "1px solid rgba(224,160,46,0.30)", borderRadius: 10, padding: "12px 14px" }}>
          <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: ".4px", color: "#B45309", marginBottom: 6 }}>EXPLOITABLE WEAKNESS</div>
          <div style={{ fontSize: 13.5, color: C.text700, lineHeight: "19px" }}>{weakness}</div>
          {weaknessClips && weaknessClips.length > 0 && <div style={{ marginTop: 8 }}><ClipBadge ids={weaknessClips} onViewClips={onViewClips} /></div>}
        </div>
      </div>
      <ReportNote text={justification} />
    </div>
  );
}

function ReadinessGrid({ title, rows }) {
  return (
    <div style={{ marginBottom: 4 }}>
      {title && <div style={{ fontSize: 13, fontWeight: 700, color: C.text700, marginBottom: 8 }}>{title}</div>}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "2px 24px" }}>
        {rows.map((r) => (
          <div key={r.format} style={{ display: "grid", gridTemplateColumns: "120px 1fr", alignItems: "center", gap: 12, padding: "8px 0" }}>
            <span style={{ fontSize: 13, color: C.text700 }}>{r.format}</span>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <div style={{ flex: 1, height: 6, borderRadius: 9999, background: "#EDEFF2", position: "relative", overflow: "hidden" }}>
                <div style={{ position: "absolute", left: 0, top: 0, bottom: 0, borderRadius: 9999, width: `${((r.rating - 1) / 4) * 100}%`, background: ratingColor(r.rating) }} />

              <span style={{ fontSize: 11.5, color: C.text500, minWidth: 78 }}>{r.verdict}</span>
            </div>
          </div>
        ))}
      </div>
    </div>

}

function ReportBullets({ title, tone, items, onViewClips }) {
  const good = tone === "good";
  const color = good ? C.green : C.amber;
  const icon = good
    ? <svg viewBox="0 0 16 16" width="15" height="15" fill="none"><path d="M3 8.5 L6.5 12 L13 4.5" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" /></svg>
    : <svg viewBox="0 0 16 16" width="15" height="15" fill="none"><path d="M3 8 H12 M8 4 L12 8 L8 12" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round" /></svg>;
  return (
    <div style={{ marginBottom: 4 }}>
      {title && <div style={{ fontSize: 13, fontWeight: 700, color: C.text700, marginBottom: 8 }}>{title}</div>}
      <ul style={{ listStyle: "none" }}>
        {items.map((it, i) => {
          const text = typeof it === "string" ? it : it.text;
          const clips = typeof it === "string" ? null : it.clips;
          return (
            <li key={i} style={{ display: "flex", gap: 10, fontSize: 14, color: C.text700, lineHeight: "21px", marginBottom: 9 }}>
              <span style={{ color, flex: "none", marginTop: 2 }}>{icon}</span>
              <span>{text}{clips && clips.length > 0 && <span style={{ marginLeft: 8, verticalAlign: "middle" }}><ClipBadge ids={clips} onViewClips={onViewClips} /></span>}</span>

          );
        })}
      </ul>

}

function HighlightBox({ line, detail, clips, onViewClips }) {
  return (
    <div style={{ background: "rgba(26,168,224,0.07)", border: "1px solid rgba(26,168,224,0.25)", borderRadius: 12, padding: "14px 16px", marginTop: 4 }}>
      <p style={{ fontSize: 14, fontWeight: 700, color: C.text900, lineHeight: "21px", marginBottom: 6 }}>{line}</p>
      <p style={{ fontSize: 14, color: C.text700, lineHeight: "22px" }}>{detail}</p>
      {clips && clips.length > 0 && <div style={{ marginTop: 10 }}><ClipBadge ids={clips} onViewClips={onViewClips} /></div>}
    </div>
  );
}

function ReportBlock({ block, onViewClips }) {
  switch (block.type) {
    case "scales": return <ScaleGroup title={block.title} attrs={block.attrs} flags={block.flags} onViewClips={onViewClips} />;
    case "facts": return <FactList title={block.title} items={block.items} />;
    case "super": return <SuperTag text={block.text} label={block.title ? block.title.toUpperCase() : undefined} clips={block.clips} onViewClips={onViewClips} />;
    case "superWeak": return <SuperWeak title={block.title} strength={block.strength} weakness={block.weakness} justification={block.justification} strengthClips={block.strengthClips} weaknessClips={block.weaknessClips} onViewClips={onViewClips} />;
    case "readiness": return <ReadinessGrid title={block.title} rows={block.rows} />;
    case "bullets": return <ReportBullets title={block.title} tone={block.tone} items={block.items} onViewClips={onViewClips} />;
    case "highlight": return <HighlightBox line={block.line} detail={block.detail} clips={block.clips} onViewClips={onViewClips} />;
    case "note": return <ReportNote text={block.text} />;
    default: return null;
  }
}

function ScoutReport({ activeTab, setActiveTab, onViewClips, showNav = true }) {
  const section = SECTIONS.find((s) => s.id === activeTab) || SECTIONS[0];
  const idx = SECTIONS.findIndex((s) => s.id === section.id);
  return (
    <div>
      {/* tab strip */}
      <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 20, borderBottom: `1px solid ${C.border}`, paddingBottom: 14 }}>
        {SECTIONS.map((s, i) => {
          const on = s.id === activeTab;
          return (
            <button
              key={s.id}
              onClick={() => setActiveTab(s.id)}
              title={s.title}
              style={{
                display: "inline-flex", alignItems: "center", gap: 7, padding: "7px 12px", borderRadius: 9, border: "none",
                cursor: "pointer", fontFamily: FONT, fontSize: 13, fontWeight: 600,
                background: on ? C.navy : C.bgGrey, color: on ? "#fff" : C.text700, transition: "all .15s",
              }}
            >
              {s.short}
            </button>
          );
        })}
      </div>

      {/* active section */}
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 16 }}>
        <span style={{ width: 24, height: 24, borderRadius: 6, background: C.navy, color: "#fff", fontSize: 12, fontWeight: 700, display: "flex", alignItems: "center", justifyContent: "center", flex: "none" }}>{idx + 1}</span>
        <h3 style={{ fontSize: 17, fontWeight: 700, color: C.text900 }}>{section.title}</h3>
      </div>

      <div style={{ display: "flex", flexDirection: "column", gap: 22 }}>
        {section.blocks.map((b, i) => <ReportBlock key={i} block={b} onViewClips={onViewClips} />)}
      </div>

      {/* prev / next (inline, only when not rendered as a pinned footer) */}
      {showNav && (
      <div style={{ position: "sticky", bottom: 0, zIndex: 5, display: "flex", justifyContent: "space-between", marginTop: 28, paddingTop: 16, paddingBottom: 16, borderTop: `1px solid ${C.border}`, background: "#fff" }}>
        <button
          onClick={() => idx > 0 && setActiveTab(SECTIONS[idx - 1].id)}
          disabled={idx === 0}

/* AI Mode example prompts for interrogating scout reports. These describe
   intents over the report corpus — rating, format, recency, scout, role, age —
   rather than searching by player name. */
const AI_REPORT_EXAMPLES = [
  { icon: "star", text: "Show me the strongest reports — anything rated 4.5 or above", hint: "Highest-rated assessments across the network" },
  { icon: "clock", text: "What have we filed on young batters in the last month?", hint: "Recent reports, batting roles, youngest players" },
  { icon: "spark", text: "Standout T20 prospects flagged by scouts recently", hint: "Top-rated white-ball reports, newest first" },
  { icon: "shield", text: "Which Test-format reports came back most convincingly?", hint: "Red-ball reports ranked by scout conviction" },
];

/* Lightweight keyword "intent" matcher for the reports corpus. Reads the
   free-text query, infers what the scout wants to interrogate, then filters,
   ranks and explains a set of reports. Stand-in for a real LLM call. */
function aiReportSearch(query) {
  const q = (query || "").toLowerCase();
  const has = (...words) => words.some((w) => q.includes(w));

  // anchor "recency" to the newest report in the demo data
  const NOW = new Date("2026-06-18");
  const daysAgo = (iso) => (NOW - new Date(iso)) / (1000 * 60 * 60 * 24);

  const intents = [];
  let filterFn = () => true;
  let scorer = (r) => r.rating;
  let summary = "";

  const wantsTopRated = has("strong", "strongest", "best", "high", "highest", "top", "4.5", "5 star", "five star", "convincing", "standout", "outstanding", "impressive", "rave");
  const wantsRecent = has("recent", "recently", "latest", "last month", "this month", "last 30", "30 days", "last week", "7 days", "new", "newest", "just");
  const wantsTest = has("test", "red-ball", "red ball", "first-class", "first class", "four-day", "four day", "longer format");
  const wantsT20 = has("t20", "white-ball", "white ball", "twenty20", "short format", "franchise");
  const wantsODI = has("odi", "50-over", "50 over", "one-day", "one day", "list a", "list-a");
  const wantsYoung = has("young", "youngster", "teen", "teenager", "youth", "academy", "junior", "schools", "u17", "u18", "16", "15", "14", "raw", "prospect");
  const wantsBat = has("bat", "batter", "batsman", "batting", "top-order", "top order", "opener", "wk", "keeper", "wicketkeeper");
  const wantsBowl = has("bowl", "bowler", "bowling", "pace", "seam", "fast", "spin", "spinner");
  const wantsAllrounder = has("all-rounder", "all rounder", "allrounder", "all-round", "all round");

  // scout name lookups
  const scoutHit = SCOUTS.map((s) => s.name).find((n) => q.includes(n.toLowerCase().split(" ")[0]) || q.includes(n.toLowerCase()));

  if (scoutHit) {
    intents.push(`Scout: ${scoutHit}`);
    filterFn = (r) => r.scout === scoutHit;
    scorer = (r) => r.rating * 2 - daysAgo(r.sortDate) / 60;
    summary = `Reading this as a request to review ${scoutHit}'s filed reports. I've pulled their assessments and ordered them by rating, with the most recent breaking any ties.`;
  } else if (wantsTopRated) {
    intents.push("Highest-rated reports");
    if (wantsTest) intents.push("Test format");
    if (wantsT20) intents.push("T20 format");
    if (wantsBat) intents.push("Batting roles");
    if (wantsBowl) intents.push("Bowling roles");
    filterFn = (r) =>
      (!wantsTest || r.format === "Test") &&
      (!wantsT20 || r.format === "T20") &&
      (!wantsODI || r.format === "ODI") &&
      (!wantsBat || /bat|wk/i.test(r.role)) &&
      (!wantsBowl || /bowl/i.test(r.role)) &&
      (!wantsAllrounder || /all-rounder/i.test(r.role));
    scorer = (r) => r.rating * 3 - daysAgo(r.sortDate) / 120;
    summary = "Treating this as a hunt for the most convincing assessments. I've ranked by scout rating first, surfacing the reports where the verdict came back strongest" + (wantsTest ? ", narrowed to red-ball fixtures" : wantsT20 ? ", narrowed to T20 fixtures" : "") + ".";
  } else if (wantsRecent) {
    intents.push("Most recent reports");
    if (wantsYoung) intents.push("Young players");
    if (wantsBat) intents.push("Batting roles");
    if (wantsT20) intents.push("T20 format");
    filterFn = (r) =>
      (!wantsYoung || r.age <= 18) &&
      (!wantsBat || /bat|wk/i.test(r.role)) &&
      (!wantsBowl || /bowl/i.test(r.role)) &&
      (!wantsT20 || r.format === "T20") &&
      (!wantsTest || r.format === "Test") &&
      (!wantsODI || r.format === "ODI");
    scorer = (r) => -daysAgo(r.sortDate) + r.rating * 0.4;
    summary = "Interpreting this as a request for the freshest intel. I've ordered reports newest-first" + (wantsYoung ? ", filtered to the younger players" : "") + (wantsBat ? ", focused on batting roles" : "") + ", using rating as a tie-breaker.";
  } else if (wantsTest || wantsT20 || wantsODI) {
    const fmt = wantsTest ? "Test" : wantsT20 ? "T20" : "ODI";
    intents.push(`${fmt} format`);
    filterFn = (r) => r.format === fmt;
    scorer = (r) => r.rating * 2 - daysAgo(r.sortDate) / 90;
    summary = `Reading this as a ${fmt}-format query. I've isolated ${fmt} reports and ranked them by rating, keeping the more recent assessments higher.`;
  } else if (wantsYoung) {
    intents.push("Young players", "Highest-rated");
    filterFn = (r) => r.age <= 17;
    scorer = (r) => r.rating * 2 + (18 - r.age) * 0.3;
    summary = "Treating this as a focus on the youngest names in the system. I've filtered to under-17 reports and ranked by rating, nudging the very youngest players up.";
  } else if (wantsBat || wantsBowl || wantsAllrounder) {
    const label = wantsAllrounder ? "All-rounders" : wantsBowl ? "Bowling roles" : "Batting roles";
    intents.push(label, "Ranked by rating");
    filterFn = (r) =>
      (!wantsAllrounder || /all-rounder/i.test(r.role)) &&
      (!wantsBowl || /bowl/i.test(r.role)) &&
      (!wantsBat || /bat|wk/i.test(r.role));
    scorer = (r) => r.rating * 2 - daysAgo(r.sortDate) / 120;
    summary = `Reading this as a focus on ${label.toLowerCase()}. I've filtered the corpus to that profile and ordered by scout rating.`;
  } else {
    intents.push("Most notable reports");
    scorer = (r) => r.rating * 2 - daysAgo(r.sortDate) / 100;
    summary = "I couldn't tie this to a specific filter, so I've surfaced the most notable recent reports — weighting rating and recency together. Try naming a format, a rating threshold, a role or a scout for a sharper cut.";
  }

  const ranked = REPORT_LIST.filter(filterFn)
    .map((r) => ({ r, score: scorer(r) }))
    .sort((a, b) => b.score - a.score)
    .map((x) => x.r);

  return { intents, summary, ranked };
}

/* Per-report one-line rationale for why the AI surfaced it. */
function aiReportReason(r) {
  const bits = [];
  if (r.rating >= 4.5) bits.push("top-rated assessment");
  else if (r.rating >= 4) bits.push("strong verdict");
  else if (r.rating <= 2.5) bits.push("a watching brief");
  bits.push(`${r.format} · ${r.role}`);
  if (r.age <= 16) bits.push(`only ${r.age}`);
  return bits.slice(0, 3).join(" · ");
}

                <button onClick={resetAi} style={{ marginLeft: "auto", display: "flex", alignItems: "center", gap: 7, border: `1px solid ${C.borderGrey}`, background: "#fff", borderRadius: 9, padding: "8px 14px", fontFamily: FONT, fontSize: 13.5, fontWeight: 600, color: C.text700, cursor: "pointer" }}>

                </div>
              ) : (
                <div style={{ border: `1px solid ${C.border}`, borderRadius: 14, overflow: "hidden" }}>

      ) : (
      <div onClick={(e) => e.stopPropagation()}>
        <div style={{ display: "flex", alignItems: "center", gap: 10, background: C.bgGrey, border: `1px solid ${C.border}`, borderRadius: 12, padding: "14px 18px", marginBottom: 22 }}>
          <svg viewBox="0 0 18 18" fill="none" width="18" height="18"><circle cx="8" cy="8" r="5" stroke={C.text400} strokeWidth="1.6" /><path d="M12 12 L16 16" stroke={C.text400} strokeWidth="1.6" /></svg>
          <input
            value={query}
            onChange={(e) => setQuery(e.target.value)}
            placeholder="Search by player, fixture or scout..."
            style={{ flex: 1, border: "none", background: "transparent", outline: "none", fontSize: 15, color: C.text900, fontFamily: FONT }}
          />
          {query && (
            <span onClick={() => setQuery("")} style={{ cursor: "pointer", color: C.text400, display: "flex" }}>
              <svg viewBox="0 0 16 16" fill="none" width="15" height="15"><path d="M3 3 L13 13 M13 3 L3 13" stroke="currentColor" strokeWidth="1.6" /></svg>
            </span>
          )}
        </div>

        <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 18, flexWrap: "wrap" }}>
          <span style={{ fontSize: 14, color: C.text500, marginRight: 4 }}>Filter</span>
          <Dropdown id="scout" label="Scout" value={scout} isDefault={scout === "All"} options={scoutOptions} onPick={setScout} />
          <Dropdown id="format" label="Format" value={format} isDefault={format === "All"} options={formatOptions} onPick={setFormat} />
          <Dropdown id="rating" label="Rating" value={ratingOptions.find((o) => o.value === minRating)?.label} isDefault={minRating === 0} options={ratingOptions} onPick={setMinRating} getLabel={(o) => o.label} getValue={(o) => o.value} />
          <Dropdown id="date" label="Date" value={dateOptions.find((o) => o.value === dateRange)?.label} isDefault={dateRange === "All"} options={dateOptions} onPick={setDateRange} getLabel={(o) => o.label} getValue={(o) => o.value} />
          <Dropdown id="role" label="Archetype / Role" value={role} isDefault={role === "All"} options={roleOptions} onPick={setRole} />
          {activeCount > 0 && (
            <button onClick={clearAll} style={{ fontSize: 13, fontWeight: 600, color: C.activeBlue, background: "none", border: "none", cursor: "pointer", fontFamily: FONT }}>Clear all</button>
          )}
          <span style={{ marginLeft: "auto", fontSize: 14, color: C.text500 }}>{filtered.length} report{filtered.length === 1 ? "" : "s"}</span>
        </div>

        <div style={{ border: `1px solid ${C.border}`, borderRadius: 14, overflow: "hidden" }}>
          <table style={{ width: "100%", borderCollapse: "collapse" }}>
            <ReportHead />
            <tbody>
              {filtered.length === 0 ? (
                <tr>
                  <td colSpan={7} style={{ padding: "48px 24px", textAlign: "center", color: C.text500, fontSize: 15 }}>
                    No reports match your search or filters. <span onClick={clearAll} style={{ color: C.activeBlue, fontWeight: 600, cursor: "pointer" }}>Clear all</span>
                  </td>
                </tr>
              ) : (
                filtered.map((r) => <ReportRow key={r.id} r={r} />)
              )}
            </tbody>
          </table>
        </div>
      </div>
      )}
    </main>
  );
}

function PlayerReport({ phase = "open", onClose }) {
  const [filter, setFilter] = useState("all");
  const [activeClip, setActiveClip] = useState("m1");
  const [hoverMarker, setHoverMarker] = useState(null);
  const [loading, setLoading] = useState(false);
  const [query, setQuery] = useState("");
  const [restrictClips, setRestrictClips] = useState(null);
  const [restrictSource, setRestrictSource] = useState(null); // "report" | "search"
  const [reportSection, setReportSection] = useState("profile");
  const [momentsView, setMomentsView] = useState("activity");
  const [activeBall, setActiveBall] = useState("b1_1");
  const [colW, setColW] = useState([100/3, 100/3]); // % widths of col1 and col2; col3 takes the rest (equal thirds on open)
  const [collapsed, setCollapsed] = useState([false, false, false]); // video, moments, report
  const toggleCol = (i) =>
    setCollapsed((prev) => {
      const next = [...prev];
      // never allow all three collapsed; keep at least one expanded
      if (!next[i] && prev.filter((c) => !c).length <= 1) return prev;
      next[i] = !next[i];
      return next;
    });
  const COLLAPSED_W = 46; // px width of a collapsed strip
  const [tlZoom, setTlZoom] = useState(1); // timeline zoom: 1 = fit, up to 8x
  const [tlWin, setTlWin] = useState({ left: 0, right: 1 }); // visible ratio window across the track
  const tlScrollRef = useRef(null);
  const TL_MIN = 1, TL_MAX = 8;
  const updateTlWin = () => {
    const el = tlScrollRef.current;
    if (!el) return;
    const content = el.clientWidth * tlZoomRef.current;
    const left = content ? el.scrollLeft / content : 0;
    setTlWin({ left, right: Math.min(1, left + 1 / tlZoomRef.current) });
  };
  const tlZoomRef = useRef(1);
  const tlFocusRef = useRef(null); // { ratio, anchor } captured at zoom time
  useEffect(() => { tlZoomRef.current = tlZoom; }, [tlZoom]);
  // After the track width updates for a new zoom, reposition scroll so the focal point stays put.
  useLayoutEffect(() => {
    const el = tlScrollRef.current;
    const f = tlFocusRef.current;
    if (!el) return;
    if (tlZoom <= TL_MIN) { el.scrollLeft = 0; updateTlWin(); tlFocusRef.current = null; return; }
    if (!f) { updateTlWin(); return; }
    const content = el.clientWidth * tlZoom;            // new full track width
    const target = f.ratio * content - el.clientWidth * f.anchor;
    el.scrollLeft = Math.max(0, Math.min(content - el.clientWidth, target));
    updateTlWin();
    tlFocusRef.current = null;
  }, [tlZoom]);
  const zoomTimeline = (delta, anchorRatio) => {
    const el = tlScrollRef.current;
    const a = anchorRatio != null ? anchorRatio : 0.5;
    if (el) {
      const content = el.clientWidth * tlZoomRef.current; // current full track width
      // content-ratio (0..1) of the point currently under the anchor
      const ratio = content ? (el.scrollLeft + el.clientWidth * a) / content : a;
      tlFocusRef.current = { ratio, anchor: a };
    }
    setTlZoom((z) => Math.max(TL_MIN, Math.min(TL_MAX, +(z + delta).toFixed(2))));
  };
  const tlBarRef = useRef(null);
  const [tlBarDrag, setTlBarDrag] = useState(false);
  // Move the scroll position so the visible window's LEFT edge sits at ratio `r` (0..1 of full track)
  const scrollToRatio = (r) => {
    const el = tlScrollRef.current;
    if (!el) return;
    const content = el.clientWidth * tlZoomRef.current;
    const maxLeft = content - el.clientWidth;
    el.scrollLeft = Math.max(0, Math.min(maxLeft, r * content));
    updateTlWin();
  };
  useEffect(() => {
    if (!tlBarDrag) return;
    const onMove = (e) => {
      const bar = tlBarRef.current;
      if (!bar) return;
      const rect = bar.getBoundingClientRect();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const winW = 1 / tlZoomRef.current;            // thumb width as ratio of track
      let center = (clientX - rect.left) / rect.width; // where the pointer is (0..1)
      let leftRatio = center - winW / 2;               // align thumb center to pointer
      leftRatio = Math.max(0, Math.min(1 - winW, leftRatio));
      scrollToRatio(leftRatio);
    };
    const onUp = () => setTlBarDrag(false);
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup", onUp);
    window.addEventListener("touchmove", onMove, { passive: false });
    window.addEventListener("touchend", onUp);
    document.body.style.userSelect = "none";
    return () => {
      window.removeEventListener("mousemove", onMove);
      window.removeEventListener("mouseup", onUp);
      window.removeEventListener("touchmove", onMove);
      window.removeEventListener("touchend", onUp);
      document.body.style.userSelect = "";
    };
  }, [tlBarDrag]);
  const [dragIdx, setDragIdx] = useState(null); // which keyline is being dragged (0 or 1)
  const rowRef = useRef(null);
  const videoRef = useRef(null);
  const LOCAL_VIDEO = encodeURI("Screen Recording 2026-06-18 120510.mp4");

  useEffect(() => {
    if (dragIdx === null) return;
    const onMove = (e) => {
      const el = rowRef.current;
      if (!el) return;
      const rect = el.getBoundingClientRect();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const pct = ((clientX - rect.left) / rect.width) * 100;
      setColW((prev) => {
        const [a, b] = prev;
        const MIN = 18; // min % per column
        if (dragIdx === 0) {
          const next = Math.max(MIN, Math.min(100 - b - MIN, pct));
          return [next, b];
        } else {
          const next = Math.max(MIN, Math.min(100 - a - MIN, pct - a));
          return [a, next];
        }
      });
    };
    const onUp = () => setDragIdx(null);
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup", onUp);
    window.addEventListener("touchmove", onMove, { passive: false });
    window.addEventListener("touchend", onUp);
    document.body.style.userSelect = "none";
    document.body.style.cursor = "col-resize";
    return () => {
      window.removeEventListener("mousemove", onMove);
      window.removeEventListener("mouseup", onUp);
      window.removeEventListener("touchmove", onMove);
      window.removeEventListener("touchend", onUp);
      document.body.style.userSelect = "";
      document.body.style.cursor = "";
    };
  }, [dragIdx]);

  const counts = useMemo(() => {
    const c = { yorker: 0, wicket: 0, dot: 0, error: 0 };
    MOMENTS.forEach((m) => (c[m.type] += 1));
    return c;
  }, []);

  const visibleMoments = useMemo(() => {
    let list = MOMENTS;
    if (restrictClips) list = list.filter((m) => restrictClips.includes(m.id));
    else if (filter !== "all") list = list.filter((m) => m.type === filter);
    return list;
  }, [filter, restrictClips]);

  const visibleBalls = useMemo(() => {
    // Prototype scope: innings 1, up to the 6th over — show every delivery.
    let list = BALLS.filter((b) => (b.innings || 1) === 1 && b.over <= 6);
    if (restrictClips) list = list.filter((b) => b.momentId && restrictClips.includes(b.momentId));
    else if (filter !== "all") list = list.filter((b) => b.type === filter);
    return [...list].sort((a, b) =>
      ((a.innings || 1) - (b.innings || 1)) || (a.over - b.over) || (a.ball - b.ball)
    );
  }, [filter, restrictClips]);

  const activeMoment = MOMENTS.find((m) => m.id === activeClip) || MOMENTS[0];
  const activeBallObj = BALLS.find((b) => b.id === activeBall) || BALLS[0];

  const activeVideo = momentsView === "ballbyball"
    ? { type: activeBallObj.type, title: `Over ${ballRef(activeBallObj)} · ${activeBallObj.outcome}`, at: activeBallObj.at, videoStart: activeBallObj.videoStart }
    : { type: activeMoment.type, title: activeMoment.title, at: activeMoment.at, videoStart: activeMoment.videoStart };

  useEffect(() => {
    const v = videoRef.current;
    if (!v) return;
    const seek = () => { try { v.currentTime = activeVideo.videoStart || 0; } catch (e) {} };
    if (v.readyState >= 1) seek();
    else v.addEventListener("loadedmetadata", seek, { once: true });
  }, [momentsView, activeClip, activeBall, activeVideo.videoStart]);

  function runFilter(next) {
    setLoading(true);
    setRestrictClips(null);
    setRestrictSource(null);
    setQuery("");
    setFilter(next);
    setTimeout(() => setLoading(false), 420);

  function viewSupporting(ids) {

    setRestrictClips(ids);

    setTimeout(() => {
      setLoading(false);
      if (ids.length) setActiveClip(ids[0]);
    }, 420);
  }

  function playClip(id) {
    setActiveClip(id);
    const m = MOMENTS.find((x) => x.id === id);
    const v = videoRef.current;
    if (v && m) {
      try {
        v.currentTime = m.videoStart || 0;
        v.play().catch(() => {});
      } catch (e) {}
    }
  }

  function playBall(id) {
    setActiveBall(id);
    const b = BALLS.find((x) => x.id === id);
    const v = videoRef.current;
    if (v && b) {
      try {
        v.currentTime = b.videoStart || 0;
        v.play().catch(() => {});
      } catch (e) {}
    }
  }

  function submitQuery(q) {
    if (!q.trim()) return;
    setLoading(true);
    const lower = q.toLowerCase();
    let type = null;
    if (lower.includes("yorker")) type = "yorker";
    else if (lower.includes("wicket")) type = "wicket";
    else if (lower.includes("mistake") || lower.includes("error")) type = "error";
    else if (lower.includes("dot") || lower.includes("pressure")) type = "dot";

    let pool = MOMENTS;
    if (type) pool = pool.filter((m) => m.type === type);
    if (lower.includes("final over") || lower.includes("death")) pool = pool.filter((m) => m.at >= 2400);
    else if (lower.includes("early over")) pool = pool.filter((m) => m.at < 900);

    const ids = pool.map((m) => m.id);
    setFilter("all");
    setRestrictClips(ids);
    setRestrictSource("search");
    setTimeout(() => {
      setLoading(false);
      if (ids.length) setActiveClip(ids[0]);

  useEffect(() => {

  const loading2 = phase === "loading";

  const CollapsedStrip = ({ i }) => (

        <div style={{ opacity: loading2 ? 0 : 1, transition: "opacity .4s ease .15s", height: "100%", display: "flex", flexDirection: "column", minHeight: 0 }}>

          <span style={{ fontSize: 13, fontWeight: 700, letterSpacing: "0.6px", textTransform: "uppercase", color: C.text400 }}>Scout Report</span>
          <button

          >
